body:
  text: 少儀外𫝊卷上宋吕祖謙撰東萊吕氏曰後生學問且湏理㑹曲禮少儀禮儀等學灑掃應對進退之事及先理㑹爾雅訓詁等文字然後可以語上下學而上逹自此脱然有得度越諸子也不如此則是躐等犯分陵節終不能成孰先𫝊焉孰後倦焉不可不察也滎陽公嘗言後生初學且湏理㑹氣象氣象好時百事自當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤夀夭之所由定也滎陽公嘗説攻其惡無攻人之惡盖自攻其惡日夜且自㸃檢絲毫不盡則慊於心豈有工夫㸃檢他人邪楊應之學士言後生學問聰眀强記不足畏惟思索學問尋究者為可畏耳東萊公嘗言凡衆人日夕所說之話趙丈仲長諸公都無此話也衆人所作之事如楊公應之李公君行諸公都不做衆人做底事也滎陽公教學者讀書湏要字字分眀仍每句最下一字尤要聲重則記牢司馬温公㓜時患記問不若人群居講習衆兄弟既成誦游息矣獨下帷絶編案孔子讀易韋編三絶乃指積久功深之時此即以誦讀為絶編于義未安盖相沿之誤迨能背誦乃止用力多者収功逺其所精誦者乃終身不忘矣並童蒙訓今世學不講男女從㓜便驕惰壊了到長益凶狠只為未嘗為子弟之事則於其親已有物我不肯屈下病根常在病随所居而長至死只依舊為子弟則不能安洒掃應對有朋友則不能下朋友有官長則不能下官長為宰相則不能下天下之賢甚則至於狥私意義理都喪也只為病根不去随所居所接而長今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦難矣並横渠張氏語録范忠宣公戒子弟曰人雖至愚責人則眀雖有聰眀恕己則昏爾曹但常以責人之心責己恕己之心恕人不患不到聖賢地位也范忠宣公言行録㓜學之士先要分别人品之上下何者是聖賢所為之事何者是下愚所為之事向善背惡去彼取此此幼學所當先也顔子孟子亞聖也學之雖未至亦可為賢人今之學者若能知此則顔孟之事我亦可學言温而氣和則顔子之不遷漸可學矣過而能悔又不憚改則顔子之不貳漸可學矣知埋鬻之戲不如爼豆念慈母之愛始於三遷自幼至老不厭不改終始一意則我之不動心亦可如孟子矣若夫立志不髙則其學皆常人之事語及顔孟則不敢當也其心曰我為孩童豈敢學顔孟㢤此人不可以語上矣先生長者見其卑下豈肯與之語㢤先生長者不肯與之語則其所與語者皆下等人也言不忠信下等人也行不篤敬下等人也過而不知悔下等人也悔而不知改下等人也聞下等之語為下等之事譬如坐於房舍之中四面皆墻壁也雖欲開眀不可得矣書曰不學墻面孔子曰其猶正墻面而立也與言人不可以不學也楊子曰吾為開眀㢤言學聖賢然後心開而意眀也陳了翁集建州有君子曰胡憲曰劉勉之非身所得一毫不受此後生所宜法也近見世人縁親姻故舊干求差遣為世鄙笑尤可戒也頃年嘗聞元祐間范仲宣作相其子子夷名正平當入逺忠宣欲以恩例換近地子夷堅不肯曰當入逺即入逺不欲以恩例求僥倖前人立志例皆如此讀書不輟甚書不讀了萬一都廢且須自今重新勤苦下十分工夫不可因循隠忍甘心作庸人過一生最是行義一事不可放過正心脩身念念湏學前軰久久自然相應大凡為學湏以見賢為主孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士然則見賢廣者其徳大見賢寡者其徳小子貢問為仁而孔子荅以工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者然則事大夫之賢友士之仁所以利為仁之器也然則見賢不可以已也只是所謂賢者大湏取捨分眀不可二三易所謂定其交而後求者是也既能見賢又湏要尊賢若但見而不能尊則與獸畜之無異今人於有勢者則能屈而於賢不能尊是未之熟思若無志於善則何所不可若必有志焉則於此不可茍也韓退之作師説曲中今世人之病大抵古人以為榮者今人以為耻如不能尊賢之類是也為學之要先要實頭不説大話須是自麤至細自微至顯但不可分麤細微顯為兩事言忠信行篤敬言必信行必果最是初學要下工夫䖏作事第一不可茍且不可因循要作便作直是了當方可放下衣服之制飲食之度字畫之别以至音聲笑語之髙下行步進趨之遲速當一以古人為法古之善教人者必以此為本所以養誠閑邪而反人道之正也若於此數事少有舛異若不能自克久久之間必至喪志失身為學之本莫先於讀書讀書之法須令日有課程句讀有未曉大義有未通不惜與人商𣙜不惜就人讀授凡人多以此為耻曽不知不如是則有終身之耻與其有終身之耻不若忍暫時之耻也又况從人讀授適足以為榮陳公瑩中尊敬前軰皆可為後生法晚年過揚州見滎陽公坐受六拜又拜祖母河南夫人請必無荅拜然後拜其與它人語必曰吕公或曰吕侍講其對前軰說後進必斥姓名未嘗少改吕進伯為河南北運判黄魯直為北京教官託魯直請門客數日斥去之召魯直謂曰此人豈可為人師某至學院却見與小子對坐如此豈可為人師請魯直别請一門客魯直為之遴選且嚴戒之曰吕運判行古禮賢且加慎既數日又逐去魯直問所以進伯云此人尤甚却聞呼小子字豈可為人師耶並吕舍人答人書往見滎陽公與楊道孚諸人書外封只押字書中禮數極簡張正素先生子厚於右丞從表兄也未嘗呼字滎陽公以為禮此道也今亡矣楊應之兄弟平生安貧樂道未嘗少屈於人元豐間親喪服除至京師寓予家榆林舊第日以麤飯置一盆又以一盆盛菜蔬兄弟分食之甘如飴蜜不求於人卒能有所立云大抵後生為學湏是嚴立課程不可一日放慢每日湏讀一般經書一般子書不湏多只要令精熟湏静室危坐讀取二三百遍湏令成誦不可一日放過也史書湏每日讀取一卷或半卷以上始見功須是従人授讀疑難處便質問湏是孜孜就人不可自家先自放慢也然此是學之業又湏理㑹所以為學者何事一行一住一語一黙湏要盡合道理求古聖賢用心竭力従之亦無不至矣夫指引者師之功也行有不至從旁規戒者朋友之任也决意而往則湏用己力難仰他人也並舍人雜說陳瑩中嘗作責沈文送其姪孫㡬叟云予元豐乙丑為禮部貢院㸃檢官適與校書郎范公淳夫同舍公嘗論顔子之不遷不貳惟伯淳有之余問公曰伯淳誰也公黙然久之曰不知有程伯淳耶予謝曰生長東南實未知也時予年二十九矣自是以来嘗以寡陋自愧得其傳者如楊中立亦未識之也所謂責沈者葉公沈諸梁也葉公問孔子於子路子路不對葉公當世賢者魯有仲尼而不知宜乎子路之不對也瑩中謂世有伯淳而已不知宜自責者也今世之人聞己所不知其不愠而發謗罵者㡬希矣况能自責日夜以為愧乎范太史遺事了翁之子正由云了翁自是每得明道先生之文必冠帶然後讀之舍人雜說范太史年十五六時在成都玉泉宅居㕔事之西閣晝夜觀書未嘗出户唯是冬年節出拜尊長禮畢復入閣人不見其喜怒戲笑之容范太史燕居正色危坐未嘗不冠出入步履皆有常處几案無長物研墨刀筆終嵗不易其所平生所觀書如手未觸衣稍華者不服十餘年不易衣亦無垢汚履雖穿如新皆出於自然未嘗有意如此也范太史讀書必端坐斂容正書冊然後開未嘗靠側収足盛暑不袒裼祁寒不擁爐書室中不設榻平生晝日不偃仰也范太史言舊年子弟赴官有乞書於蜀公者蜀公不許曰仕宦不可廣求人知受恩多則難立朝矣元祐中承議郎㳺冠卿知咸平縣回一日謁范太史曰畿邑任滿例除監司欲乞一言於鳯池時范子功在中書也公答曰公望實審當為監司朝廷必湏除授家叔雖在政府某未嘗與人告差遣冠卿慙沮而退子冲聞此語因白公曰說與不説皆可也何必面折之公曰如此是欺此人也吾故以誠告之元祐中舉子吴中應大科以進卷遍投従官文理乖謬李廌方叔為范太史門賓與諸人同觀撫掌絶倒公偶出見之問所以然皆以實對覽其文數篇不笑亦不言掩卷他語侍坐者亦不敢問他日吴中請見公諭之曰觀足下之文應進士舉且不可况大科乎此必有人相誤請亟歸讀書學文且習進士中辭謝而去並范太史遺事馬援兄子嚴敦並喜譏議而通輕俠客援前在交趾遺書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒欲使汝曹不忘之耳龍伯髙敦厚周慎口無擇言謙約節儉㢘公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敇之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡将下車輒切齒州郡以為言吾常為寒心是以不願子孫效也朱勃年十二常候援兄况衣方領能矩步辭言嫻雅援見之自失况知其意酌酒慰援曰勃小器速成智盡此耳卒當従汝禀學勿畏也桓曄初平中天下亂避地㑹稽住止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所受臨去之際屋中尺寸之物悉疏付主人纎微不漏每當危亡之急其志彌固賓客従者皆肅其行也江革少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養數遇賊或刼欲将去革輒涕泣求哀言有老母辭氣愿欵有足感動人者賊以是不忍犯之或乃指避兵之方遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不畢給並後漢書魏董遇人有從學者遇不肯教而云必當先讀百徧言讀書百徧而義自見魏李秉家誡曰凡人行事年少立身不可不慎勿輕論人勿輕説事如此則悔吝何由而生患禍何從而至矣並三國志太傅東海王鎮許昌以王安期為記室參軍雅相知重敇世子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷味遺言不如親承音㫖王參軍人倫之表汝其師之世説雍州刺史武昌王渾與左右作文檄自號楚王改年為元光備置百官以為戲長史王翼之封呈其手迹八月庚申廢渾為庶人徙始安郡上遣員外散騎侍郎東海戴眀寳詰責渾因逼令自殺時年十七張率作賦頌二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慚而退並南史甄琛舉秀才入都積嵗頗以奕棊廢日至乃通夜不止手下蒼頭常令執燭或睡頓大加其杖如此非一奴不勝椘痛乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪乃以圍棊日夜不息豈是向善之意而肆加杖罰不亦非理琛悵然慚感遂從許赤彪假書研習後魏楊椿戒子孫曰北都時朝法嚴急太和初吾兄弟三人並居内職兄在髙祖左右吾與津在文眀太后左右于時口敇責諸内官十日仰宻得一事不列便大嗔嫌諸人多有依敇宻列者亦有太后髙祖中間𫝊言構間者吾兄弟自相誡曰今忝二聖近臣居母子間甚難宜深慎之又列人事亦何容易縦被嗔責慎勿輕言十餘年中未嘗言一人罪時大被嫌責答曰臣等非不聞人言正恐不審仰誤聖聴以是不敢言二聖間言語終不敢輒爾傳通太和二十一年吾從濟州来朝在清徽堂預宴髙祖謂諸王諸貴曰北京之日太后嚴眀左右因此有是非言和朕母子者唯楊椿兄弟遂舉爵賜兄及我酒汝等脱若萬一蒙眀主知遇宜深慎言語並北史韋昭博奕論云今世之人多不務經術好玩博奕廢事棄業忘寝與食窮日盡眀繼以脂燭當其臨局交争雌雄未決専精鋭意神迷體倦人事曠而不修賔旅闕而不接雖有太牢之饌韶夏之樂不暇存也至或賭及衣物徙棊易行㢘耻之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間而空妨日廢業終無補益文選王楊盧駱謂之四傑裴行儉曰士之致逺先器識而後文藝勃等雖有文才而浮躁淺露豈享爵禄之器耶楊子沉静應得令長餘得令終為幸其後勃溺南海照鄰投潁水賔王被誅炯終盈川令皆如行儉之言閻立本善畫秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥随波容與太宗擊賞數四詔坐者為詠召立本令寫焉時閣外𫝊呼云畫師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賓不勝愧赧退誡其子曰吾少好學讀書幸免墻面縁情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深誡勿習成末技姚崇遺令誡子孫曰比日見諸逹官身亡以後子孫既失覆䕃多至貧寒斗尺之間參商是競豈唯自玷仍更辱先無論曲直俱受嗤毁並舊唐書嬰稚識人顔色知人喜怒便加教誨使為則為使止則止比及數嵗可省笞罰父母威嚴而有慈則子女畏慎而生孝矣吾見世間無教而有愛每不能然飲食運為恣其所欲宜誡翻奨應呵反笑至有識知謂法當爾驕慢已習方復制之捶撻至死而無威忿怒日隆而増怨逮乎成長終為敗徳孔子云少成若天性習慣如自然是也俗諺曰教婦初来敎子嬰孩誠㢤斯語梁元帝時有一學士聰眀有才為父所寵失於教義一言之是徧於行路終年譽之一行之非揜蔵文飾冀其自改登婚宦暴慢日滋竟以言語不擇為周逖抽腸釁皷云夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親盡此三者而已矣自茲以往至於九族皆本於三親焉故於人倫為重者也不可不篤兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則傳服學則連業遊則共方雖有悖亂之人不能不相愛也及其壮也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則疏薄矣今使疏薄之人而節量親厚之恩猶方底而圓盖為不合矣唯友悌深至不為傍人之所移者免矣二親既歿兄弟相顧當如形之與影聲之與響受先人之遺體惜已身之分氣非兄弟何念㢤兄弟之際異於他人望深則易怨地親則易彌譬猶居室一穴則塞之一隙則塗之故無頽毁之慮如雀䑕之不䘏風雨之不防壁䧟楹淪無可救矣僕妾之為雀䑕妻子之為風雨甚㢤兄弟不睦則子姪不愛子姪不愛則羣從疏薄羣従疏薄則僮僕為讎敵矣如此則行路皆踖其面而蹈其心誰救之㢤人或交天下之士皆有歡愛而失敬於兄者何其能多而不能少也人或将數萬之師得其死力而失恩於弟者何其能疏而不能親也人之事兄不可不同於事父何愛弟不及愛子乎是反照而不眀也沛國劉璡嘗與兄瓛連棟隔壁瓛呼之數聲不應良久方答瓛恠問之乃云向来未著衣帽故也以此事兄可以免矣借人典籍皆湏愛護先有缺壊就為補治此亦士大夫百行之一也濟陽江禄讀書未竟雖有急速必待卷束整齊然後得起故無損敗人不厭其求假焉或有狼籍几案分散部帙多為童幼婢妾之所㸃汚風雨犬䑕之所毁傷實為累徳吾每讀聖人書未嘗不肅敬對之其故紙有五經詞義及賢逹姓名不敢穢用也凡宗親世數有從父有從祖有族祖江南風俗自茲已往髙秩者通呼為尊同昭穆者雖百世猶稱兄弟若對他人稱之皆云族人河北士人雖三二十世猶呼為従伯從叔梁武帝嘗問一中土人曰卿北人何故不知有族答云骨肉易疏不忍言族耳當時雖為敏對於禮未通父母疾篤醫雖賤雖少則涕泣而拜之以求哀也梁孝元在江州嘗有不豫世子方等親拜中兵參軍李猷焉吾生於亂世長於戎馬流離播越聞見已多所值名賢未嘗不神醉魂迷向慕之也人在少年神情未定所與欵狎熏漬陶染言笑舉動無心於學潜移暗化自然似之何况操履藝能較朋易習者也是以與善人居如入芝蘭之室久而自芳也與惡人居如入鮑魚之肆久而自臭也梁朝全盛時貴游子弟多無學術至有諺云上車不落則著作體中何如則秘書無不熏衣剃面傅粉施朱駕長簷車躡髙齒屐坐棊子布方褥憑斑絲隠囊列器玩於左右從容出入望若神仙眀經求第則顧人答策三九公讌則假手賦詩當爾之時亦快士也及亂離之後朝市遷革銓衡選舉非復曩者之親當路秉權不見昔時之黨求諸身而無所得施之世而無所用兀若枯木泊若窮流鹿獨戎馬之間轉死溝壑之際當爾之時誠駑材也有學藝者觸地而安自荒亂以来諸見俘虜雖百世小人知讀論語孝經者尚為人師雖千載冠冕不曉書記者莫不畊田養馬以此觀之汝可不自勉邪父兄不可常依鄉國不可常保一旦流離無人庇廕當自求諸身耳諺曰積財千萬不如薄伎在身伎之易習而可貴者無過讀書也人見隣里親戚有佳快者使子弟慕而學之不知使學古人何其蔽也所以讀書學問本欲開心眀目利於行耳未知養親者欲其觀古人之先意承顔怡聲下氣不憚劬勞以致甘㬉惕然慚懼起而行之也未知事君者欲其觀古人之守職無侵見危授命不忘箴諫以利社稷惻然自念思欲效之也素驕奢者欲其觀古人之恭儉節用卑以自牧禮為教本敬者身基瞿然自失斂容抑志也素鄙吝者欲其觀古人之貴義輕財少私寡慾忌盈惡滿賙窮䘏匱赧然悔耻積而能㪚也素暴悍者欲其觀古人之小心黜已含垢藏疾尊賢容衆苶然沮䘮若不勝衣也素怯懦者欲其觀古人之彊毅正直立言必信求福不回勃然奮厲不可恐懾也歴兹以往百行皆然世人讀書者但能言之不能行之忠孝無聞仁義不足加以斷一條訟不必得其理宰千户縣不必理其民問其造屋不必知楣横而梲竪也問其為田不必知稷早而黍遲也吟嘯談謔諷詠辭賦事既優閑材増迂誕軍國經綸略無施用故為武人俗吏所共嗤詆良由是乎夫學者所以求益耳見人讀數十卷書便自髙大凌忽長者輕慢同列人疾之如讎敵惡之如鴟梟如此以學自損不如無學也夫字者墳籍根本世之學徒多不曉字讀五經者是徐邈而非許慎習賦頌者信褚詮而忽吕忱眀史記者専皮鄒而廢篆籀學漢書者悦應蘓而畧蒼雅不知書音是其枝葉小學乃其宗系晉宋以来所有部帙楷正可觀不無俗字非為大損至梁天監之間斯風未變大同之未訛替滋生蕭子雲改易字體邵陵王頗行譌字前上為草能傍作長之類是也朝野翕然以為楷式畫虎不成多所傷敗爾後墳籍略不可㸔北朝䘮亂之餘書迹鄙陋加以専輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追来為歸更生為蘇先人為考如此非一徧滿經傳或曰今之經典子皆謂非説文所言子皆云是然則許慎勝孔子乎曰今之經典皆孔子手迹耶客曰今之説文皆許慎手迹乎答曰許慎檢以六文貫以部分使不得誤誤則覺之孔子存其義而不論其文也先儒尚得改文従意何况書寫流𫝊耶必如左𫝊止戈為武反正為乏皿蟲為蠱亥有二首六身之類後人自不得輒改也安敢以説文較其是非㢤且余亦不專以說文為是也其有援引經傳與今乖者未之敢從大抵服其為書櫽括有條例剖析窮根源鄭元注書往往引以為證若不信其説則冥冥不知一㸃一畫有何意焉世間小學者不通古今必依小篆是正書記凡爾雅三蒼説文豈能悉得蒼頡本指㢤亦是隨代損益各有同異西晉以往字書何可全非但令體例成就不為專輙耳古字多假借以中為仲以説為悦以召為卲以閒為閑如此之徒亦不勞改自有訛繆過成鄙俗亂傍為舌楫下無耳席中加帶惡上安西鼓外設皮鑿頭生毁獵化為獦音葛獸名出山海經寵變成竉竉音郎動反孔也故從穴如此之類不可不知吾昔初㸔説文蚩薄世字從正則懼人不識随俗則意嫌其非為是不得下筆也所見漸廣更知通變救前之執将欲半焉若文章著述猶擇微相影響者行之官曹文書世間尺牘幸不違俗也多見士大夫耻渉農商羞務工伎射既不能穿札筆則纔記姓名飽食醉酒忽忽無事以此銷日以此終年或因家世緒餘得一階半級便謂為足安能自苦及有吉凶大事議論得失懵然張口如坐雲霧公私宴集談古賦詩塞黙低頭欠伸而已有識傍觀代其入地何惜數年勤學長受一生愧辱哉江南閭里間士大夫或不學問羞為鄙朴道聴塗説强事飾辭呼徴質為周鄭謂霍亂為博陸上荆州必稱峽西下揚都要云海郡言食則餬口道錢則孔方問移則楚邱論婚則燕爾及王則無不仲宣語劉則無不公幹凡有一二百件轉相祖述尋問莫知源由施行時復失所近世有兩人朗悟士也性多營綜略無成名經不足以待問史不足以討論文章無可傳於集録書迹未堪以留愛翫卜筮射六得三醫藥治十瘥五音樂在數十人下弓矢在千百人中天文繪畫棊博略得梗槩皆不通熟惜乎以彼神眀若省異端當精妙也梁世士大夫皆尚褒衣博帶大冠髙履出則車輿入則扶侍郊郭之内無乘馬者周宏正為王宣城所愛給一果下馬常服御之舉朝以為放逹至乃尚書郎乘馬則糺劾之及侯景之亂膚脆骨柔不堪行步體羸氣弱不耐寒暑坐死倉卒者往徃而然並顔氏家訓李習之寄從弟正辭書知爾京兆府取觧不得如其所懐念勿在意借如用汝之所知分為十焉用其九學聖人之道和其心使其餘以與時世進退俯仰如可求也則不啻富且貴矣如非吾力也雖盡用其十秪益勞其心矣安能有所得乎李習之答朱載言書古之人相接有等輕重有儀列於經傳皆可詳引如師之於門人則名之於朋友則字而不名稱之於師則雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之於門人驗也夫子於鄭兄事子産於齊兄事晏嬰平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言㳺過矣子張曰子夏云何曽子曰堂堂乎張也是朋友字而不名驗矣子貢曰賜也何敢望回又曰師與商也孰賢子㳺曰有澹臺滅眀者行不由徑是稱於師雖朋友亦名騐也足下之書曰韋君詞楊君潜足下之徳與二君未知先後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行非求益者也欲速成者也並李文公集今之儒者移學文藝干仕進之心以收其放心而羙其身則如何古之人不可及㢤父兄以文藝令其子弟朋友以仕進相招往而不返則身心始荒而不治萬事之成咸不逮古先矣能攻人實病者至難也能受人實攻者為尤難人能攻我實病我能受人實攻朋友之義其庶㡬乎不然其不相䧟而為小人者㡬希矣並胡氏知言汪信民嘗言人常咬得菜根則百事可做胡安國康侯聞之擊節嘆賞吕氏師友雜志唐充之每稱前軰說後生不能忍詬不足為人聞人宻論不能容受而輕泄之者不足以為人童蒙訓吴庠妻謝氏子賀與賔客言及人之長短夫人屏間竊聞之怒笞賀百或觧夫人曰臧否士之常何忽笞之若是夫人曰愛其女者必取三復白圭之士而妻之今獨産一子使知義命而出語忘親豈可久之道㢤因泣涕不食賀由是恐懼謹黙崇寧中叔巽来省滎陽于符離有故人遇之甚薄及欲行来召飯叔巽欲往人或止之曰此人相待如此之薄何必赴飯叔巽曰不欲與人生睚眦之怨舍人雜録劉器之嘗論至誠之道凡事據實而言才渉詐偽後来忘了前話便是脱空據實而言十年二十年後説無異同賢便不説劉安世元来只是脱空漢田腴承伯云作官従人奏辟非但賓主便有君臣之義不宜輕也杜祁公食于家惟一麪一飯而已或羙其儉公曰衍本一措大爾名位爵禄冠冕服用皆國家者俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵禄國家奪之却為一措大又将何以自奉養邪語録文正范公之子純仁娶婦将歸或傳婦以羅為帷幔者公聞之不悦曰羅豈為幃幔之物邪吾家素清儉安得亂吾家法敢持至吾家當火於廷遺事随初九出門交有功人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也茍以親愛而随之則是私情所與豈合天理故出門而交則有功也出門謂非私暱交不以私故能随遇而有功六二係小子失丈夫象曰係小子弗兼與也人之所随得正則逺邪従非則失是無兩從之理二既係初則失五矣弗能兼與也所以戒人徔正當專一也随六三係丈夫失小子丈夫九四也小子初也陽之在上者丈夫也居下者小子也舍初従上得随之宜也上随則善也如昏之随眀事之從善上随也背是從非捨眀逐暗下随也並易𫝊桓譚謂秦近君能説堯典篇目兩字之説至千餘言但説若稽古三萬言班固歎後世經𫝊既已乖離博學者又不思多聞闕疑之義而務碎義逃難便辭巧説五字之文至於二三萬言是今滋蔓傷本之弊古人已深斥之矣又随而踵之循覆車之轍邪彼方自詫曰前之文人才慳而不能宏闡有愧今日之富亦難與言矣卜子夏首作喪服𫝊記者曰𫝊者𫝊也𫝊其師說云爾唐陸淳於春秋每一義必稱淳聞於師曰詩則有魯故有韓故有齊后氏故齊孫氏故毛詩故訓𫝊書則有大小夏侯觧故前人惟故之尚如此並眺以道集王吉為昌邑王中尉王好遊獵吉上疏諫曰大王不好書術而樂逸逰馮式撙銜馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冐霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所偃薄數以耎脆之玉體犯勤勞之煩毒非所以全夀命之宗進仁義之隆也夫廣厦之下細旃之上眀師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢然發憤忘食日新厥徳其樂豈徒銜橛之間㢤王吉𫝊韓魏公曰以之遇可以成功以之不遇可以免禍者其惟晦乎又曰人情微處湏深體之若直用已以處所失多矣又曰君子操履湏當精微放過一事便為小人所窺韓魏公因論君子小人之際皆當以誠待之但知其為小人則淺與之接耳凡人至於小人欺己處不覺則已覺則必露其眀以破之公獨不然眀足以照小人之欺然每受之未嘗形於色也以上並韓魏公語録仁宗朝李都尉喜延士大夫盡聲色之樂一時館閣清流無不往者韓魏公於其間最年少獨未嘗造焉李數召而公數以事辭人有强之者公曰固欲往但未有名耳公處之不失和李莫能致怨同時諸公亦不以為介也韓魏公在政府時極有難處置事嘗言天下事無有盡如意湏是隠忍不然不可一日處矣公言時同列二三公不相下語常至相擊待其氣定每與平之以理使歸于是雖好勝者亦自然不争也韓魏公知歐陽永叔不以繫辭為孔子書又多不以文中子為可取中書相㑹累年未嘗與之言及也韓魏公在北門一属官有小才公多委以事人謂公真許之他日或問之公曰某人但任術所為大不敦篤大中其弊韓魏公為陜西招討時尹師魯與夏英公不相能師魯於公處即論英公事英公於公處亦論師魯公皆納之不形遂無事不然不静矣韓魏公云臨事若慮得是劄定脚做更不移成敗則任他如此方可成務韓魏公言王文正弟傲不可訓一日遇冬至祀家廟列百壺於堂前弟皆擊破之家人惶駭文正忽自外入見酒流滿路不可行黙無一言但攝衣步入堂其後弟忽感悟而復為善終亦不言已上並魏公别録韓魏公重修五代祖塋域記夫謹家諜按諜牒古字通用而心不忘于先塋者孝之大也惟墳墓祀祖之有託故以子孫不絶為重琦自志于學每見祖先所為文字與家世銘志則知寶而蔵之有遺逸者嘗精意搜掇未始少懈時編嵗緝寖以大備其所志先域之所在雖距今百有餘年必思博訪而得之卒能不隳先業推及先塋之八世得以嵗時奉祀少慰庸嗣之志向若家牒不謹祖先文字不𫝊雖有孝於祖先之心欲究其宅兆而嚴祀之其可得乎韓魏公文集古之學者必嚴其師師嚴然後道尊道尊然後篤敬篤敬然後能自守能自守然後果於用果於用然後不畏而不遷三代之衰學校廢至兩漢師道尚存故其學者各守其經以自用是以漢之政理文章與其當時之事後世莫及者其所從来㴱矣後世師法漸壊而今世無師學之尊嚴故自輕其道輕之則不能至不至則不能篤信信不篤則不知所守守不固則有所畏而物可移是故學者惟俯仰徇時以希祿利為急至於忘本趨末流而不返夫以不信不固之心守不至之學雖欲果於自用莫知其所以用之之道又况有利禄之誘刑禍之懼以遷之㢤歐陽文忠集迂叟曰世之人不以耳視而目食者鮮矣聞者駭曰何謂也迂叟曰衣冠所以為容觀也稱體斯羙矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎飲食之物所以為味也適口斯善矣世人取果餌而刻鏤之朱緑之以為盤案之玩豈非以目食者乎司馬温公答劉蒙書曰昔張伯松語陳孟公曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣馬文淵戒兄子欲其效龍伯髙之周慎謙儉不欲其效杜季良憂人之憂樂人之樂也光愚無似何足以望萬一於古人然私心所慕者伯松伯髙而不敢為孟公季良之行也况幼時始能言則誦儒書習謹飭長而為吏則讀律令守繩墨視地而後敢行頓足而後敢立足下一旦待以陳孟公杜季良之徒光能無駭乎並司馬温公文集人之愛其子者或多曰兒㓜未有知爾俟其長而敎之是猶養惡木之萌芽曰俟其合抱而伐之其用力顧不多㢤又如開籠縱鳥而捕之觧韁放馬而逐之曷若勿縦勿觧之為易也司馬温公家訓孝經曰不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮夫為人子而事親或虧雖有他善累百不能掩也可不慎乎古之為士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知湏去趨善便自此成徳後之人自童稚間已有汲汲趨利之意何由得向德樂文仲説鄒浩學士一事亦好嘗見人寫字不端正必湏勸戒之或人問之曰每事端正則心自正矣貴姓子弟於飲食玩好之物之類直是一生将身伏事不觧如管城之陳醋瓶洛中之史畫匣是也更有甚事伯淳與君實嘗同觀史畫猶能題品耐煩伯淳問尹實能如此與他畫否君實曰自家一箇身猶不能自持更有甚工夫到此人於外物奉身者事事要好只有自家一箇身與心却不要好茍得外物好時却不知道自家身與心却已先不好了也並程氏遺書蠱九二幹母之蠱不可貞𫝊曰子之於母當以柔巽輔導之使得於義不順而致敗蠱則子之罪也從容将順豈無道乎以婦人言之則隂柔可知若伸己剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順将承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也旅初六旅𤨏瑣斯其所取災𫝊曰六以隂柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存汙下者也志卑之人既處旅困鄙猥𤨏細無所不至乃其所以致悔辱取災咎也世治則庠序之教行有法以率之不率教者有至於移屏不齒又禮義㢘耻之風所漸陶父兄朋友之義所勸督故人莫不强於進學及夫亂世上不復主其教則無以率之風俗雜亂浮偷父兄所教者趨利朋友所習者從時故人莫不肆情廢惰為自棄之人程氏經觧嘉祐初正獻公㑹諸壻于東園時韓師朴王正國新登第皆恵穆婿也中休鄰園閑坐正國唱自作小詞甚多景純問師朴曰師朴莫亦有否師朴正色曰豈有此事正獻公書古人詩好衣不近節士體粱肉自怕腹中書兩句于子舍之屏風恵穆公赴人飲食之約未嘗後到曰使主人望望然而客不至吾不忍也並吕氏家塾廣記凡作書唘先記彼人父祖名諱于几案恩讎分眀此四字非有道者之言也無好人此三字非有徳者之言也後生戒之世之人以往来宴㑹書問為徒費日力不若不講之為愈是未知先王治人道之意人之所以異於禽獸者以其有禮樂相交接之道也故曰粲然有文以相接驩然有恩以相愛此其所以講信脩睦而免於争奪相殺之患者常消禍於未萌也孟子曰出入相友守望相助疾病相扶持則百姓親睦言往来之不可以已也鄉飲酒曰吾觀於鄉而知王道之易易言宴會之不可以已也聘義曰相接以敬讓則不相侵陵言書問之不可以已也此三者所以消禍於未萌而使免於争奪相接之患也大要前軰作事多周詳後軰作事多濶畧字者朋友之稱也嘗見前軰先進不呼後進字後進固不敢呼先進字也氣類不同者亦不相呼三四十年来先進始有字後進者又觀前軰凡父行父執受拜不跪並酬酢事變劉器之待制云某初登科與二同年謁張觀參政三人同起身請教張曰某自守官以来常持四字曰勤謹和緩中間一後生應聲曰勤謹和既聞命矣緩之一字某所未聞張正色作氣曰何嘗教賢緩不及事且道世間甚事不因忙後錯了童蒙訓問某有一病且如作一簡便湏安排言語寫教如法要人𫝊玩飯一客便要器皿飲饌如法教人感激推此每事皆然先生曰此夸心欲以勝人皆私也作簡請客如法是合做底只下面一句便是病根此病根因甚有只為不合有巳得人道好於我何加孟子謂宫室之羙妻妾之奉所識窮乏者得我與皆是有箇夸心又問更有一病稱好則溢羙稱不好則溢惡此猶是好惡使然且如今日泥濘只是五寸湏説一尺有利害猶且得無利害湏要如此此病在甚處曰欲以意氣加人亦是夸心有人做作説話張筋努脉皆為有已又問或曰我初學問事必不當人必笑然我未有所得湏直情言之若掩蔵畏人笑徒自欺耳此言如何曰是也謂同坐諸子曰亦湏切記此語謝子與伊川别一年往見之伊川曰相别又一年做得甚工夫謝曰也只是去箇矜字曰何故曰子細㸃檢得来病痛盡在這裏若按伏得這箇罪過方有向進處伊川㸃頭因語在坐同志者曰此人為學切問近思者也余問矜字罪過何故恁地大謝子曰今人做事只管要夸耀别人耳目渾不闗自家受用事有底人食前方丈便向人前喫只疏食菜羮却去房裏為甚恁地並上蔡謝氏語録愚柔之質質之不羙也以不羙之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變不羙之質及不能變則曰天質不羙非學所能變是果於自棄其為不仁甚矣愚者自是而不求自私者以天下非吾事懦者甘為人下而不辭有是三者欲身之脩未之有也吕芸閣中庸觧劉道原之子羲仲本佳近亦變壊楊子雲稱言心聲書心畫羲仲每有書来呼兒軰譯之數四有不能識者字小而闇弱亦其心術之不明類此某每於書畫之間可得其人之大半劉元城語録温公曰凡觀書當先其文辨其音然後可以求其義今喜以且為言案以且為言者如姑且權且之類是非可否不得所安自堕於小人之偷而媿夫君子之篤敬並眺以道集人湏是一切世味淡薄方好不要有富貴相周恭叔才髙識眀初年亦甚好後来只縁累重若把得定儘長進在昔聞眀道先生一見吕微仲便曰宰相微仲湏做只是這漢俗謝上蔡云為他有貴底相態便是俗處王介甫在政事堂只喫魚羮飯因薦兩人不行下殿便乞去云世間何處無魚羮飯為縁它累輕便去住自在孟子謂堂髙數仞食前方丈侍妾數百人我得志不為學者湏先除去此等常自激昻便不到得墜墮常愛諸葛孔眀當漢末自言臣本布衣躬耕南陽茍全性命於亂世不求聞逹於諸侯後来雖應劉先主之聘宰割山河三分天下身為将相手握重兵亦何求不得何欲不遂却與後主言成都有桑八百株田十五頃子弟衣食自有餘饒臣身在外别無調度不别治生以長尺寸若死之日不使廪有餘粟庫有餘財以負陛下及卒果如其言如此軰人真可謂大丈夫矣楊訓同黎才翁侍坐胡文定先生目黎曰為士人當只知窮經問學不湏及他事如賢前所言誰又詈罵自家誰又道甚言語如此是自家身心都不用理㑹只了得與人閑争也孟子曰自反而仁矣自反而有禮矣此物奚宜至㢤萬一自家都是亦只得如此待人况罵詈長官親聞乃坐若聴人傳言是来讒賊之口更有何窮已楊訓問胡文定先生避冦諸事如意否先生曰不惟避冦應人切不得望要事事足意得常有些不足處便好人家纔事事足意便恰有不好事出陶淵眀為彭澤令不以家累自随送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之問人能充無受爾汝之實無所往而不為義爾汝者是相爾汝之小恩愛否曰湏是壁立萬仞一介不以取諸人方能如此孟子自有此氣象故説出此等話如我以吾仁我以吾義我所不為皆古之制一聞可使寡人得見之語便更不見大凡事不可放過便受爾汝並胡氏𫝊家録眺以道篤於親戚故舊及有牽聯之親一日之雅皆委曲敦叙後生從而化者甚衆以道盛文肅家外甥洪炎玉父祖母文城君亦盛氏甥以道於玉父為尊行一日同㑹京師玉父未及見以道邂逅僧寺中玉父謂以道曰公丈人行也前此未得一見以道遽折之曰某自是公表叔何丈人行之有玉父再三謝之曰是表叔是表叔但某未曽敢叙致爾以此知游學之士湏經中原先逹鉗椎方能有成也吕氏師友雜志國語公父文伯之母告季康子君子能勞後世有繼又謂其子聖王之處民也擇瘠土而處之勞其民而用之故長王天下又曰民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也左傳亦言人生在勤勤則不匱以此知勤勞者立身為善之本不勤不勞萬事不舉今夫細民能勤勞者必無凍餒之患雖不親人人亦親之常懶惰者必有饑寒之憂雖欲親人人亦不用也公父文伯之母與左傳所記皆故家遺俗相𫝊之語其必自聖人出也然則後生處身居業其可不以勤勞為先而懶惰自棄其身㢤古人自奉簡約類非後人所能及如飲食髙下固自有制度諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕此猶是極盛制度也大抵古人得食肉者至少如食肉之禄氷皆與焉肉食者謀之肉食無墨此言貴者方得肉食也荘子九方歅相子綦之子刖而鬻之於齊適當渠公之街然身食肉而終相班超者虎頭燕頷食肉相也以此知古人以食為貴食肉為難得比之後人簡約甚矣春秋以後先王之澤漸逺然善言相傳猶有存者學者得其言猶可詳思而致力也如伍子胥為人剛戾忍訽能成大事趙襄子言君所以能置無恤為能忍訽也如忍詬之道微此數人言之後人不知也荘子稱伊尹强力忍垢亦是道也後世人自處既不厚而輕用其身皆不知忍詬之道也前軰嘗教少年毋輕議人毋輕説事惟退而自脩可也學記曰幼者聴而弗問皆使人自脩不敢輕發養成徳器也鄢陵之戰范匄趨進曰塞井夷竈陳於軍中而疎行首晉椘唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉鄭侵蔡有功鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言之将為戮矣范宣子子産之言皆切論也而文子子國深抑之如此者正恐後生輕發未成徳器而先招禍敗卒無以立也故此兩人後来所立如此之逺良由老成教之有素中有所主也紹聖初滎陽公罷經筵舍于京城外華嚴寺俟命者月餘陳無已師道眺伯禹載之唐季實之問皆就華嚴見公亦為公留月餘執事左右如親子弟晨夕皆省揖于寢門之外後人能如此尊事前軰者盖少矣伊川先生甚愛表記中説君子莊敬日彊安肆日偷盖常人之情放肆則日就曠蕩自檢束則日就䂓矩並舍人雜録有人問祁寛曰尹和靖先生尋常説今日政事向背當如何寛曰不曽説渠曰賢曽問否寛曰不曽問曰何故不問寛曰先生教人思不出其位不在其位不謀其政安敢問也渠云孔孟何故説寛曰孔孟亦不曽説渠引孔孟之言寛曰此孔孟在其位為司冦齊卿時説底至於答一時君臣問政皆時君大臣問政不得不告也觀孔孟説底危行言孫及不謀其政氣象方其閒處必不説也曰如此則先生之學焉用寛曰吾每教人必以君臣父子夫婦兄弟朋友之道必欲君君臣臣父父子子則其論政亦大矣奚必指時事而言書云孝乎惟孝友于兄弟是也一日舉示先生先生曰甚善甚善祁居之尹和靖語錄古之號為賢士大夫者必謹乎禮必重乎義必從其厚必本其誠者也嗟今之世則異夫是取其便俗於禮不暇謹志急乎利於義不知重澆薄相師於厚不復從貎諛為敬於誠不必本禮也者貴有别也親戚講拜之禮所以眀尊卑長幼之異豈惟親戚凡居父祖之執亦當受子孫致敬今既論親矣至於致敬則類多交拜尊卑長幼甚矣其無别吉凶禮制人倫所甚重也不宜廢紊今期功至親或以在逺而哀遂不舉或因小隙而不通慰問或乘親喪而殺禮納室或居夫服而暗受聘定憂制在身雖拘法弗仕而不妨公肆宴樂婦女衣装當其無戚或去華彩迨夫居憂翻忌純素吉凶之禮又如是而廢紊若乃偏親在上子孫或私分産業而弗念奉養有闕尊長病未及絶肉未及寒卑幼有發篋盜匿而弗暇銜哀茹苦骨肉弗睦則絶不往来騰謗揚惡而不少隠及其歡和則尊卑無間必褻狎喧譁而不相避家至豐裕視親戚孤貧而鮮肯賑恤財雖吝嗇施緇黄則甚所甘心自山水之説熾子孫多稽留襄奉廣營宅兆而専希己福自科舉之法壞舉子茍幸中選匿服冒户而弗顧典憲婚婣之家嫌隙已成則逐婦奪女論勢而弗論義交承之間前政不肯遺後政之利後政或多毁前政之短相忌而不相睦學者自非欲得時文速化之術則莫肯從師不知古人從師本以傳授博約為事師者自非得其厚資則弗肯售其時文速化之術不知古人為師本只以教育成才為樂公舉之法久成私恩或徇權要囑託或喜阿諛巧佞或廹親故干懇或與他人互易其最下者乃受賂遺而不耻而覔舉之士或脩文䞇為勤或借勢力為援或諷士民稱述行績以取信於上或恃親舊稔熟而深切責望其最甚者操持長短而為脅取之計紛紛干求靡所不至其有專脩職業而待知己必擇所知而自薦者鮮矣附炎之態則迎意曲合冀蒙親悦迨勢去無望則罷蹤絶迹視猶路人若乃介潔剛方人惡其不入衆以禮自持人笑其徒自苦志大慮逺者例目為狂妄安分守義者悉指謂無能徇人情而多可乃得賢者之稱假公帑以妄施必有羙政之譽官職以本實之稱為簡慢而例從過呼書尺以謟諛不情為恭敬而紛紜多幅親戚往来通問未免頌徳之言交游品位微差不復相稱以字以丈相呼軰行莫辨以台相謂貴賤無殊口誦詩書者或行同於市井談論公正者或宻趨於偏曲毁譽他人者多徇愛憎而不必有實過尤在身必加文飾而誰肯服理其游學肄業者不思勉已而常冀異恩其居官任事者績考未立而已希賞典躁進者以交結為必致之資貪墨者恃行賂為救觧之術富貴遂意則無復存功業之心官年踰格則鮮肯循告老之制見利必圖其所以得臨難必規其所以避父訓其子兄勉其弟交游之議論同僚之聚話㒺不在兹茍可進身益家弗恤害人蠧國士風之虧禮違義従薄尚偽者如此何以責小民之趨正㢤宜乎欺詐攘竊放僻邪侈冒犯法令争訟繁多而莫能禁止也吾每覽簡牘所記夷考先賢言行無非禮義為歸及觀前軰書尺率皆語簡意盡於交朋則忠告無謟於卑㓜則訓誨必嚴其輕重髙下必務得體其敦篤情實自然可慕後進晩生目熟世俗之事耳熟世俗之談恬安所為未嘗疑恠則是䧟溺其心然也夫入時愈深則失正愈逺聞吾説者亦可以自警也何徳将歎習立身以力學為先力學以讀書為本今取六經及論語孟子孝經以字計之毛詩三萬九千二百二十四字尚書二萬五千七百字周禮四萬五千八百六字禮記九萬九千二十字周易二萬四千二百七字春秋左氏傳一十九萬六千八百四十五字論語一萬二千七百字孟子三萬四千六百八十五字孝經一千九百三字大小九經合四十八萬四千九十五字且以中才為率若日誦三百字不過四年半可畢或以天資稍鈍減中才之半日誦一百五十字亦止九年可畢茍能熟讀而温習之使入耳著心久不忘失全在日積之功耳里諺曰積絲成寸積寸成尺寸尺不已遂成丈匹此語雖小可以喻大後生勉之鄭氏勤學龜山楊先生見予作許少伊哀詞云文字間甚能形容少伊但全篇大體似平交哀詞前軰於前後軰之際甚嚴又云有羙一人兮豐下而多髯此語固可見其儀形然黄魯直詩玉堂若要真學士湏用儋州秃鬢翁此近乎不敬不可學也聞之使人心服陳齊之雜録凡為學之道必先至誠不誠未有能至焉者也何以見其誠居處齊荘志意凝定不妄言不茍笑開卷伏讀必起恭敬如對聖賢掩卷沉思必根義理以閑邪僻行之悠久習與性成便有聖賢前軰氣象凡勤學湏是出於本心不待父母先生督責造次不忘寢食在念然後見功茍有人則作無人則輟此之謂為父母先生勤學非為己修終無所得凡讀書必務精熟若或記性遲鈍則多誦遍數自然精熟記得堅固若是遍數不多只務强記今日成誦来日便忘其與不曽誦讀何異凡見人有一行之善則當學之勿以其同時同處貴耳賤目焉並髙登彦先修學門庭
