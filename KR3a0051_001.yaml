body:
  text: 少儀外傳卷上宋吕祖謙撰東萊吕氏曰後生學問且須理會曲禮少儀禮儀等學灑掃應對進退之事及先理會爾雅訓詁等文字然後可以語上下學而上逹自此脫然有得度越諸子也不如此則是躐等犯分陵節終不能成孰先傳焉孰後倦焉不可不察也滎陽公嘗言後生初學且須理會氣象氣象好時百事自當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤夀夭之所由定也滎陽公嘗説攻其惡無攻人之惡蓋自攻其惡日夜且自點檢絲毫不盡則慊於心豈有工夫點檢他人邪楊應之學士言後生學問聰眀強記不足畏惟思索學問尋究者為可畏耳東萊公嘗言凡衆人日夕所説之話趙丈仲長諸公都無此話也衆人所作之事如楊公應之李公君行諸公都不做衆人做底事也滎陽公教學者讀書須要字字分眀仍每句最下一字尤要聲重則記牢司馬溫公幼時患記問不若人群居講習衆兄弟既成誦遊息矣獨下帷絶編案孔子讀易韋編三絶乃指積久功深之時此即以誦讀為絶編于義未安蓋相沿之誤逮能背誦乃止用力多者收功逺其所精誦者乃終身不忘矣並童蒙訓今世學不講男女從幼便驕惰壞了到長益凶狠只為未嘗為子弟之事則於其親已有物我不肯屈下病根常在病隨所居而長至死只依舊為子弟則不能安灑掃應對有朋友則不能下朋友有官長則不能下官長為宰相則不能下天下之賢甚則至於徇私意義理都喪也只為病根不去隨所居所接而長今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦難矣並橫渠張氏語録范忠宣公戒子弟曰人雖至愚責人則眀雖有聰眀恕己則昏爾曹但常以責人之心責己恕己之心恕人不患不到聖賢地位也范忠宣公言行録幼學之士先要分别人品之上下何者是聖賢所為之事何者是下愚所為之事向善背惡去彼取此此幼學所當先也顔子孟子亞聖也學之雖未至亦可為賢人今之學者若能知此則顔孟之事我亦可學言溫而氣和則顔子之不遷漸可學矣過而能悔又不憚改則顔子之不二漸可學矣知埋鬻之戲不如爼豆念慈母之愛始於三遷自幼至老不厭不改終始一意則我之不動心亦可如孟子矣若夫立志不髙則其學皆常人之事語及顔孟則不敢當也其心曰我為孩童豈敢學顔孟哉此人不可以語上矣先生長者見其卑下豈肯與之語哉先生長者不肯與之語則其所與語者皆下等人也言不忠信下等人也行不篤敬下等人也過而不知悔下等人也悔而不知改下等人也聞下等之語為下等之事譬如坐於房舍之中四面皆墻壁也雖欲開眀不可得矣書曰不學墻面孔子曰其猶正墻面而立也與言人不可以不學也楊子曰吾為開眀哉言學聖賢然後心開而意眀也陳了翁集建州有君子曰胡憲曰劉勉之非身所得一毫不受此後生所宜法也近見世人緣親姻故舊干求差遣為世鄙笑尤可戒也頃年嘗聞元祐間范仲宣作相其子子夷名正平當入逺忠宣欲以恩例換近地子夷堅不肯曰當入逺即入逺不欲以恩例求僥幸前人立志例皆如此讀書不輟甚書不讀了萬一都廢且須自今重新勤苦下十分工夫不可因循隱忍甘心作庸人過一生最是行義一事不可放過正心修身念念須學前輩久久自然相應大凡為學須以見賢為主孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士然則見賢廣者其德大見賢寡者其德小子貢問為仁而孔子答以工欲善其事必先利其器居是邦也事其大夫之賢者友其士之仁者然則事大夫之賢友士之仁所以利為仁之器也然則見賢不可以已也只是所謂賢者大須取捨分眀不可二三易所謂定其交而後求者是也既能見賢又須要尊賢若但見而不能尊則與獸畜之無異今人於有勢者則能屈而於賢不能尊是未之熟思若無志於善則何所不可若必有志焉則於此不可茍也韓退之作師説曲中今世人之病大抵古人以為榮者今人以為耻如不能尊賢之類是也為學之要先要實頭不説大話須是自粗至細自微至顯但不可分粗細微顯為兩事言忠信行篤敬言必信行必果最是初學要下工夫處作事第一不可茍且不可因循要作便作直是了當方可放下衣服之制飲食之度字畫之别以至音聲笑語之髙下行步進趨之遲速當一以古人為法古之善教人者必以此為本所以養誠間邪而反人道之正也若於此數事少有舛異若不能自克久久之間必至喪志失身為學之本莫先於讀書讀書之法須令日有課程句讀有未曉大義有未通不惜與人商𣙜不惜就人讀授凡人多以此為耻曽不知不如是則有終身之耻與其有終身之耻不若忍暫時之耻也又况從人讀授適足以為榮陳公瑩中尊敬前輩皆可為後生法晚年過揚州見滎陽公坐受六拜又拜祖母河南夫人請必無答拜然後拜其與它人語必曰吕公或曰吕侍講其對前輩説後進必斥姓名未嘗少改吕進伯為河南北運判黃魯直為北京教官託魯直請門客數日斥去之召魯直謂曰此人豈可為人師某至學院却見與小子對坐如此豈可為人師請魯直别請一門客魯直為之遴選且嚴戒之曰吕運判行古禮賢且加慎既數日又逐去魯直問所以進伯云此人尤甚却聞呼小子字豈可為人師耶並吕舍人答人書往見滎陽公與楊道孚諸人書外封只押字書中禮數極簡張正素先生子厚於右丞從表兄也未嘗呼字滎陽公以為禮此道也今亡矣楊應之兄弟平生安貧樂道未嘗少屈於人元豐間親喪服除至京師寓豫家榆林舊第日以粗飯置一盆又以一盆盛菜蔬兄弟分食之甘如飴蜜不求於人卒能有所立云大抵後生為學須是嚴立課程不可一日放慢每日須讀一般經書一般子書不須多只要令精熟須靜室危坐讀取二三百遍須令成誦不可一日放過也史書須每日讀取一卷或半卷以上始見功須是從人授讀疑難處便質問須是孜孜就人不可自家先自放慢也然此是學之業又須理會所以為學者何事一行一住一語一默須要盡合道理求古聖賢用心竭力從之亦無不至矣夫指引者師之功也行有不至從旁規戒者朋友之任也決意而往則須用己力難仰他人也並舍人雜説陳瑩中嘗作責沈文送其姪孫幾叟云豫元豐乙丑為禮部貢院點檢官適與校書郎范公淳夫同舍公嘗論顔子之不遷不二惟伯淳有之余問公曰伯淳誰也公默然久之曰不知有程伯淳耶豫謝曰生長東南實未知也時豫年二十九矣自是以來嘗以寡陋自愧得其傳者如楊中立亦未識之也所謂責沈者葉公沈諸梁也葉公問孔子於子路子路不對葉公當世賢者魯有仲尼而不知宜乎子路之不對也瑩中謂世有伯淳而已不知宜自責者也今世之人聞己所不知其不愠而發謗罵者幾希矣况能自責日夜以為愧乎范太史遺事了翁之子正由云了翁自是每得明道先生之文必冠帶然後讀之舍人雜説范太史年十五六時在成都玉泉宅居廳事之西閣晝夜觀書未嘗出户唯是冬年節出拜尊長禮畢復入閣人不見其喜怒戲笑之容范太史燕居正色危坐未嘗不冠出入步履皆有常處几案無長物研墨刀筆終嵗不易其所平生所觀書如手未觸衣稍華者不服十餘年不易衣亦無垢汚履雖穿如新皆出於自然未嘗有意如此也范太史讀書必端坐斂容正書册然後開未嘗靠側收足盛暑不袒裼祁寒不擁爐書室中不設榻平生晝日不偃仰也范太史言舊年子弟赴官有乞書於蜀公者蜀公不許曰仕宦不可廣求人知受恩多則難立朝矣元祐中承議郎遊冠卿知咸平縣回一日謁范太史曰畿邑任滿例除監司欲乞一言於鳯池時范子功在中書也公答曰公望實審當為監司朝廷必須除授家叔雖在政府某未嘗與人告差遣冠卿慙沮而退子沖聞此語因白公曰説與不説皆可也何必面折之公曰如此是欺此人也吾故以誠告之元祐中舉子吳中應大科以進卷遍投從官文理乖謬李豸方叔為范太史門賓與諸人同觀撫掌絶倒公偶出見之問所以然皆以實對覽其文數篇不笑亦不言掩卷他語侍坐者亦不敢問他日吳中請見公諭之曰觀足下之文應進士舉且不可况大科乎此必有人相誤請亟歸讀書學文且習進士中辭謝而去並范太史遺事馬援兄子嚴敦並喜譏議而通輕俠客援前在交趾遺書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敇之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫效也朱勃年十二常候援兄况衣方領能矩步辭言嫻雅援見之自失况知其意酌酒慰援曰勃小器速成智盡此耳卒當從汝稟學勿畏也桓曄初平中天下亂避地會稽住止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所受臨去之際屋中尺寸之物悉疏付主人纎微不漏每當危亡之急其志彌固賓客從者皆肅其行也江革少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輒涕泣求哀言有老母辭氣願欵有足感動人者賊以是不忍犯之或乃指避兵之方遂得俱全於難革轉客下邳窮貧裸跣行傭以供母便身之物莫不畢給並後漢書魏董遇人有從學者遇不肯教而云必當先讀百遍言讀書百遍而義自見魏李秉家誡曰凡人行事年少立身不可不慎勿輕論人勿輕説事如此則悔吝何由而生患禍何從而至矣並三國志太傅東海王鎮許昌以王安期為記室參軍雅相知重敇世子毗曰夫學之所益者淺體之所安者深間習禮度不如式瞻儀形諷味遺言不如親承音旨王參軍人倫之表汝其師之世説雍州刺史武昌王渾與左右作文檄自號楚王改年為元光備置百官以為戲長史王翼之封呈其手迹八月庚申廢渾為庶人徙始安郡上遣員外散騎侍郎東海戴眀寶詰責渾因逼令自殺時年十七張率作賦頌二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慚而退並南史甄琛舉秀才入都積嵗頗以奕棊廢日至乃通夜不止手下蒼頭常令執燭或睡頓大加其杖如此非一奴不勝椘痛乃曰郎君辭父母仕宦若為讀書執燭不敢辭罪乃以圍棊日夜不息豈是向善之意而肆加杖罰不亦非理琛悵然慚感遂從許赤彪假書研習後魏楊椿戒子孫曰北都時朝法嚴急太和初吾兄弟三人並居內職兄在髙祖左右吾與津在文眀太后左右于時口敇責諸內官十日仰密得一事不列便大嗔嫌諸人多有依敇密列者亦有太后髙祖中間傳言構間者吾兄弟自相誡曰今忝二聖近臣居母子間甚難宜深慎之又列人事亦何容易縱被嗔責慎勿輕言十餘年中未嘗言一人罪時大被嫌責答曰臣等非不聞人言正恐不審仰誤聖聽以是不敢言二聖間言語終不敢輒爾傳通太和二十一年吾從濟州來朝在清徽堂預宴髙祖謂諸王諸貴曰北京之日太后嚴眀左右因此有是非言和朕母子者唯楊椿兄弟遂舉爵賜兄及我酒汝等脫若萬一蒙眀主知遇宜深慎言語並北史韋昭博奕論云今世之人多不務經術好玩博奕廢事棄業忘寢與食窮日盡眀繼以脂燭當其臨局交爭雌雄未決専精鋭意神迷體倦人事曠而不修賔旅闕而不接雖有太牢之饌韶夏之樂不暇存也至或賭及衣物徙棊易行廉耻之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間而空妨日廢業終無補益文選王楊盧駱謂之四傑裴行儉曰士之致逺先器識而後文藝勃等雖有文才而浮躁淺露豈享爵祿之器耶楊子沉靜應得令長餘得令終為幸其後勃溺南海照鄰投潁水賔王被誅炯終盈川令皆如行儉之言閻立本善畫秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之迹也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數四詔坐者為詠召立本令寫焉時閣外傳呼云畫師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賓不勝愧赧退誡其子曰吾少好學讀書幸免墻面緣情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深誡勿習成末技姚崇遺令誡子孫曰比日見諸逹官身亡以後子孫既失覆蔭多至貧寒斗尺之間參商是競豈唯自玷仍更辱先無論曲直俱受嗤毁並舊唐書嬰稚識人顔色知人喜怒便加教誨使為則為使止則止比及數嵗可省笞罰父母威嚴而有慈則子女畏慎而生孝矣吾見世間無教而有愛每不能然飲食運為恣其所欲宜誡翻奬應呵反笑至有識知謂法當爾驕慢已習方復制之捶撻至死而無威忿怒日隆而增怨逮乎成長終為敗德孔子云少成若天性習慣如自然是也俗諺曰教婦初來教子嬰孩誠哉斯語梁元帝時有一學士聰眀有才為父所寵失於教義一言之是遍於行路終年譽之一行之非掩藏文飾冀其自改登婚宦暴慢日滋竟以言語不擇為周逖抽腸釁鼓云夫有人民而後有夫婦有夫婦而後有父子有父子而後有兄弟一家之親盡此三者而已矣自茲以往至於九族皆本於三親焉故於人倫為重者也不可不篤兄弟者分形連氣之人也方其幼也父母左提右挈前襟後裾食則同案衣則傳服學則連業遊則共方雖有悖亂之人不能不相愛也及其壯也各妻其妻各子其子雖有篤厚之人不能不少衰也娣姒之比兄弟則疏薄矣今使疏薄之人而節量親厚之恩猶方底而圓蓋為不合矣唯友悌深至不為傍人之所移者免矣二親既歿兄弟相顧當如形之與影聲之與響受先人之遺體惜已身之分氣非兄弟何念哉兄弟之際異於他人望深則易怨地親則易彌譬猶居室一穴則塞之一隙則塗之故無頽毁之慮如雀鼠之不恤風雨之不防壁陷楹淪無可救矣僕妾之為雀鼠妻子之為風雨甚哉兄弟不睦則子姪不愛子姪不愛則羣從疏薄羣從疏薄則僮僕為讎敵矣如此則行路皆踖其面而蹈其心誰救之哉人或交天下之士皆有歡愛而失敬於兄者何其能多而不能少也人或將數萬之師得其死力而失恩於弟者何其能疏而不能親也人之事兄不可不同於事父何愛弟不及愛子乎是反照而不眀也沛國劉璡嘗與兄瓛連棟隔壁瓛呼之數聲不應良久方答瓛怪問之乃云向來未著衣帽故也以此事兄可以免矣借人典籍皆須愛護先有缺壞就為補治此亦士大夫百行之一也濟陽江祿讀書未竟雖有急速必待卷束整齊然後得起故無損敗人不厭其求假焉或有狼籍几案分散部帙多為童幼婢妾之所點汚風雨犬鼠之所毁傷實為纍德吾每讀聖人書未嘗不肅敬對之其故紙有五經詞義及賢逹姓名不敢穢用也凡宗親世數有從父有從祖有族祖江南風俗自茲已往髙秩者通呼為尊同昭穆者雖百世猶稱兄弟若對他人稱之皆云族人河北士人雖三二十世猶呼為從伯從叔梁武帝嘗問一中土人曰卿北人何故不知有族答云骨肉易疏不忍言族耳當時雖為敏對於禮未通父母疾篤醫雖賤雖少則涕泣而拜之以求哀也梁孝元在江州嘗有不豫世子方等親拜中兵參軍李猷焉吾生於亂世長於戎馬流離播越聞見已多所值名賢未嘗不神醉魂迷向慕之也人在少年神情未定所與欵狎熏漬陶染言笑舉動無心於學潛移暗化自然似之何况操履藝能較朋易習者也是以與善人居如入芝蘭之室久而自芳也與惡人居如入鮑魚之肆久而自臭也梁朝全盛時貴遊子弟多無學術至有諺云上車不落則著作體中何如則祕書無不熏衣剃面傅粉施朱駕長簷車躡髙齒屐坐棊子布方褥憑斑絲隱囊列器玩於左右從容出入望若神仙眀經求第則顧人答策三九公宴則假手賦詩當爾之時亦快士也及亂離之後朝市遷革銓衡選舉非復曩者之親當路秉權不見昔時之黨求諸身而無所得施之世而無所用兀若枯木泊若窮流鹿獨戎馬之間轉死溝壑之際當爾之時誠駑材也有學藝者觸地而安自荒亂以來諸見俘虜雖百世小人知讀論語孝經者尚為人師雖千載冠冕不曉書記者莫不耕田養馬以此觀之汝可不自勉邪父兄不可常依鄉國不可常保一旦流離無人庇廕當自求諸身耳諺曰積財千萬不如薄伎在身伎之易習而可貴者無過讀書也人見鄰里親戚有佳快者使子弟慕而學之不知使學古人何其蔽也所以讀書學問本欲開心眀目利於行耳未知養親者欲其觀古人之先意承顔怡聲下氣不憚劬勞以致甘暖惕然慚懼起而行之也未知事君者欲其觀古人之守職無侵見危授命不忘針諫以利社稷惻然自念思欲效之也素驕奢者欲其觀古人之恭儉節用卑以自牧禮為教本敬者身基瞿然自失斂容抑志也素鄙吝者欲其觀古人之貴義輕財少私寡欲忌盈惡滿賙窮恤匱赧然悔耻積而能散也素暴悍者欲其觀古人之小心黜已含垢藏疾尊賢容衆苶然沮喪若不勝衣也素怯懦者欲其觀古人之強毅正直立言必信求福不回勃然奮厲不可恐懾也歷兹以往百行皆然世人讀書者但能言之不能行之忠孝無聞仁義不足加以斷一條訟不必得其理宰千户縣不必理其民問其造屋不必知楣橫而梲竪也問其為田不必知稷早而黍遲也吟嘯談謔諷詠辭賦事既優間材增迂誕軍國經綸略無施用故為武人俗吏所共嗤詆良由是乎夫學者所以求益耳見人讀數十卷書便自髙大凌忽長者輕慢同列人疾之如讎敵惡之如鴟梟如此以學自損不如無學也夫字者墳籍根本世之學徒多不曉字讀五經者是徐邈而非許慎習賦頌者信褚詮而忽吕忱眀史記者専皮鄒而廢篆籀學漢書者悅應蘇而略蒼雅不知書音是其枝葉小學乃其宗系晉宋以來所有部帙楷正可觀不無俗字非為大損至梁天監之間斯風未變大同之未訛替滋生蕭子雲改易字體邵陵王頗行訛字前上為草能傍作長之類是也朝野翕然以為楷式畫虎不成多所傷敗爾後墳籍略不可看北朝喪亂之餘書迹鄙陋加以専輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為考如此非一遍滿經傳或曰今之經典子皆謂非説文所言子皆云是然則許慎勝孔子乎曰今之經典皆孔子手迹耶客曰今之説文皆許慎手迹乎答曰許慎檢以六文貫以部分使不得誤誤則覺之孔子存其義而不論其文也先儒尚得改文從意何况書寫流傳耶必如左傳止戈為武反正為乏皿蟲為蠱亥有二首六身之類後人自不得輒改也安敢以説文較其是非哉且余亦不專以説文為是也其有援引經傳與今乖者未之敢從大抵服其為書櫽括有條例剖析窮根源鄭元注書往往引以為證若不信其説則冥冥不知一點一畫有何意焉世間小學者不通古今必依小篆是正書記凡爾雅三蒼説文豈能悉得蒼頡本指哉亦是隨代損益各有同異西晉以往字書何可全非但令體例成就不為專輒耳古字多假借以中為仲以説為悅以召為卲以間為間如此之徒亦不勞改自有訛繆過成鄙俗亂傍為舌楫下無耳席中加帶惡上安西鼓外設皮鑿頭生毁獵化為獦音葛獸名出山海經寵變成竉竉音郎動反孔也故從穴如此之類不可不知吾昔初看説文蚩薄世字從正則懼人不識隨俗則意嫌其非為是不得下筆也所見漸廣更知通變救前之執將欲半焉若文章著述猶擇微相影響者行之官曹文書世間尺牘幸不違俗也多見士大夫耻涉農商羞務工伎射既不能穿札筆則才記姓名飽食醉酒忽忽無事以此銷日以此終年或因家世緒餘得一階半級便謂為足安能自苦及有吉凶大事議論得失懵然張口如坐雲霧公私宴集談古賦詩塞默低頭欠伸而已有識傍觀代其入地何惜數年勤學長受一生愧辱哉江南閭里間士大夫或不學問羞為鄙朴道聽塗説強事飾辭呼徴質為周鄭謂霍亂為博陸上荆州必稱峽西下揚都要云海郡言食則糊口道錢則孔方問移則楚邱論婚則燕爾及王則無不仲宣語劉則無不公幹凡有一二百件轉相祖述尋問莫知源由施行時復失所近世有兩人朗悟士也性多營綜略無成名經不足以待問史不足以討論文章無可傳於集録書迹未堪以留愛玩卜筮射六得三醫藥治十瘥五音樂在數十人下弓矢在千百人中天文繪畫棊博略得梗槩皆不通熟惜乎以彼神眀若省異端當精妙也梁世士大夫皆尚褒衣博帶大冠髙履出則車輿入則扶侍郊郭之內無乘馬者周宏正為王宣城所愛給一果下馬常服御之舉朝以為放逹至乃尚書郎乘馬則糾劾之及侯景之亂膚脆骨柔不堪行步體羸氣弱不耐寒暑坐死倉卒者往往而然並顔氏家訓李習之寄從弟正辭書知爾京兆府取解不得如其所懷念勿在意借如用汝之所知分為十焉用其九學聖人之道和其心使其餘以與時世進退俯仰如可求也則不啻富且貴矣如非吾力也雖盡用其十秪益勞其心矣安能有所得乎李習之答朱載言書古之人相接有等輕重有儀列於經傳皆可詳引如師之於門人則名之於朋友則字而不名稱之於師則雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之於門人驗也夫子於鄭兄事子産於齊兄事晏嬰平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言遊過矣子張曰子夏云何曽子曰堂堂乎張也是朋友字而不名驗矣子貢曰賜也何敢望回又曰師與商也孰賢子遊曰有淡臺滅眀者行不由徑是稱於師雖朋友亦名驗也足下之書曰韋君詞楊君潛足下之德與二君未知先後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行非求益者也欲速成者也並李文公集今之儒者移學文藝干仕進之心以收其放心而美其身則如何古之人不可及哉父兄以文藝令其子弟朋友以仕進相招往而不返則身心始荒而不治萬事之成咸不逮古先矣能攻人實病者至難也能受人實攻者為尤難人能攻我實病我能受人實攻朋友之義其庶幾乎不然其不相陷而為小人者幾希矣並胡氏知言汪信民嘗言人常咬得菜根則百事可做胡安國康侯聞之擊節嘆賞吕氏師友雜志唐充之每稱前輩説後生不能忍詬不足為人聞人密論不能容受而輕泄之者不足以為人童蒙訓吳庠妻謝氏子賀與賔客言及人之長短夫人屏間竊聞之怒笞賀百或解夫人曰臧否士之常何忽笞之若是夫人曰愛其女者必取三復白圭之士而妻之今獨産一子使知義命而出語忘親豈可久之道哉因泣涕不食賀由是恐懼謹默崇寧中叔巽來省滎陽于符離有故人遇之甚薄及欲行來召飯叔巽欲往人或止之曰此人相待如此之薄何必赴飯叔巽曰不欲與人生睚眥之怨舍人雜録劉器之嘗論至誠之道凡事據實而言才涉詐偽後來忘了前話便是脫空據實而言十年二十年後説無異同賢便不説劉安世元來只是脫空漢田腴承伯云作官從人奏辟非但賓主便有君臣之義不宜輕也杜祁公食于家惟一麵一飯而已或美其儉公曰衍本一措大爾名位爵祿冠冕服用皆國家者俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵祿國家奪之却為一措大又將何以自奉養邪語録文正范公之子純仁娶婦將歸或傳婦以羅為帷幔者公聞之不悅曰羅豈為幃幔之物邪吾家素清儉安得亂吾家法敢持至吾家當火於廷遺事隨初九出門交有功人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也茍以親愛而隨之則是私情所與豈合天理故出門而交則有功也出門謂非私昵交不以私故能隨遇而有功六二係小子失丈夫象曰係小子弗兼與也人之所隨得正則逺邪從非則失是無兩從之理二既係初則失五矣弗能兼與也所以戒人徔正當專一也隨六三係丈夫失小子丈夫九四也小子初也陽之在上者丈夫也居下者小子也舍初從上得隨之宜也上隨則善也如昏之隨眀事之從善上隨也背是從非捨眀逐暗下隨也並易傳桓談謂秦近君能説堯典篇目兩字之説至千餘言但説若稽古三萬言班固歎後世經傳既已乖離博學者又不思多聞闕疑之義而務碎義逃難便辭巧説五字之文至於二三萬言是今滋蔓傷本之弊古人已深斥之矣又隨而踵之循覆車之轍邪彼方自詫曰前之文人才慳而不能宏闡有愧今日之富亦難與言矣卜子夏首作喪服傳記者曰傳者傳也傳其師説云爾唐陸淳於春秋每一義必稱淳聞於師曰詩則有魯故有韓故有齊后氏故齊孫氏故毛詩故訓傳書則有大小夏侯解故前人惟故之尚如此並眺以道集王吉為昌邑王中尉王好遊獵吉上疏諫曰大王不好書術而樂逸逰馮式撙銜馳騁不止口倦乎叱吒手苦於箠轡身勞乎車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所偃薄數以耎脆之玉體犯勤勞之煩毒非所以全夀命之宗進仁義之隆也夫廣厦之下細旃之上眀師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道欣欣然發憤忘食日新厥德其樂豈徒銜橛之間哉王吉傳韓魏公曰以之遇可以成功以之不遇可以免禍者其惟晦乎又曰人情微處須深體之若直用已以處所失多矣又曰君子操履須當精微放過一事便為小人所窺韓魏公因論君子小人之際皆當以誠待之但知其為小人則淺與之接耳凡人至於小人欺己處不覺則已覺則必露其眀以破之公獨不然眀足以照小人之欺然每受之未嘗形於色也以上並韓魏公語録仁宗朝李都尉喜延士大夫盡聲色之樂一時館閣清流無不往者韓魏公於其間最年少獨未嘗造焉李數召而公數以事辭人有強之者公曰固欲往但未有名耳公處之不失和李莫能致怨同時諸公亦不以為介也韓魏公在政府時極有難處置事嘗言天下事無有盡如意須是隱忍不然不可一日處矣公言時同列二三公不相下語常至相擊待其氣定每與平之以理使歸于是雖好勝者亦自然不爭也韓魏公知歐陽永叔不以繫辭為孔子書又多不以文中子為可取中書相會纍年未嘗與之言及也韓魏公在北門一屬官有小才公多委以事人謂公真許之他日或問之公曰某人但任術所為大不敦篤大中其弊韓魏公為陜西招討時尹師魯與夏英公不相能師魯於公處即論英公事英公於公處亦論師魯公皆納之不形遂無事不然不靜矣韓魏公云臨事若慮得是劄定腳做更不移成敗則任他如此方可成務韓魏公言王文正弟傲不可訓一日遇冬至祀家廟列百壺於堂前弟皆擊破之家人惶駭文正忽自外入見酒流滿路不可行默無一言但攝衣步入堂其後弟忽感悟而復為善終亦不言已上並魏公别録韓魏公重修五代祖塋域記夫謹家諜按諜牒古字通用而心不忘于先塋者孝之大也惟墳墓祀祖之有託故以子孫不絶為重琦自志于學每見祖先所為文字與家世銘志則知寶而藏之有遺逸者嘗精意搜掇未始少懈時編嵗緝寖以大備其所志先域之所在雖距今百有餘年必思博訪而得之卒能不隳先業推及先塋之八世得以嵗時奉祀少慰庸嗣之志向若家牒不謹祖先文字不傳雖有孝於祖先之心欲究其宅兆而嚴祀之其可得乎韓魏公文集古之學者必嚴其師師嚴然後道尊道尊然後篤敬篤敬然後能自守能自守然後果於用果於用然後不畏而不遷三代之衰學校廢至兩漢師道尚存故其學者各守其經以自用是以漢之政理文章與其當時之事後世莫及者其所從來深矣後世師法漸壞而今世無師學之尊嚴故自輕其道輕之則不能至不至則不能篤信信不篤則不知所守守不固則有所畏而物可移是故學者惟俯仰徇時以希祿利為急至於忘本趨末流而不返夫以不信不固之心守不至之學雖欲果於自用莫知其所以用之之道又况有利祿之誘刑禍之懼以遷之哉歐陽文忠集迂叟曰世之人不以耳視而目食者鮮矣聞者駭曰何謂也迂叟曰衣冠所以為容觀也稱體斯美矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎飲食之物所以為味也適口斯善矣世人取果餌而刻鏤之朱緑之以為盤案之玩豈非以目食者乎司馬溫公答劉蒙書曰昔張伯松語陳孟公曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣馬文淵戒兄子欲其效龍伯髙之周慎謙儉不欲其效杜季良憂人之憂樂人之樂也光愚無似何足以望萬一於古人然私心所慕者伯松伯髙而不敢為孟公季良之行也况幼時始能言則誦儒書習謹飭長而為吏則讀律令守繩墨視地而後敢行頓足而後敢立足下一旦待以陳孟公杜季良之徒光能無駭乎並司馬溫公文集人之愛其子者或多曰兒幼未有知爾俟其長而教之是猶養惡木之萌芽曰俟其合抱而伐之其用力顧不多哉又如開籠縱鳥而捕之解韁放馬而逐之曷若勿縱勿解之為易也司馬溫公家訓孝經曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮夫為人子而事親或虧雖有他善纍百不能掩也可不慎乎古之為士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知須去趨善便自此成德後之人自童稚間已有汲汲趨利之意何由得向德樂文仲説鄒浩學士一事亦好嘗見人寫字不端正必須勸戒之或人問之曰每事端正則心自正矣貴姓子弟於飲食玩好之物之類直是一生將身伏事不解如管城之陳醋瓶洛中之史畫匣是也更有甚事伯淳與君實嘗同觀史畫猶能題品耐煩伯淳問尹實能如此與他畫否君實曰自家一箇身猶不能自持更有甚工夫到此人於外物奉身者事事要好只有自家一箇身與心却不要好茍得外物好時却不知道自家身與心却已先不好了也並程氏遺書蠱九二幹母之蠱不可貞傳曰子之於母當以柔巽輔導之使得於義不順而致敗蠱則子之罪也從容將順豈無道乎以婦人言之則隂柔可知若伸己剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也旅初六旅瑣瑣斯其所取災傳曰六以隂柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存汙下者也志卑之人既處旅困鄙猥瑣細無所不至乃其所以致悔辱取災咎也世治則庠序之教行有法以率之不率教者有至於移屏不齒又禮義廉耻之風所漸陶父兄朋友之義所勸督故人莫不強於進學及夫亂世上不復主其教則無以率之風俗雜亂浮偷父兄所教者趨利朋友所習者從時故人莫不肆情廢惰為自棄之人程氏經解嘉祐初正獻公會諸壻于東園時韓師朴王正國新登第皆惠穆壻也中休鄰園間坐正國唱自作小詞甚多景純問師朴曰師朴莫亦有否師朴正色曰豈有此事正獻公書古人詩好衣不近節士體粱肉自怕腹中書兩句于子舍之屏風惠穆公赴人飲食之約未嘗後到曰使主人望望然而客不至吾不忍也並吕氏家孰廣記凡作書啓先記彼人父祖名諱于几案恩讎分眀此四字非有道者之言也無好人此三字非有德者之言也後生戒之世之人以往來宴會書問為徒費日力不若不講之為愈是未知先王治人道之意人之所以異於禽獸者以其有禮樂相交接之道也故曰粲然有文以相接歡然有恩以相愛此其所以講信修睦而免於爭奪相殺之患者常消禍於未萌也孟子曰出入相友守望相助疾病相扶持則百姓親睦言往來之不可以已也鄉飲酒曰吾觀於鄉而知王道之易易言宴會之不可以已也聘義曰相接以敬讓則不相侵陵言書問之不可以已也此三者所以消禍於未萌而使免於爭奪相接之患也大要前輩作事多周詳後輩作事多濶略字者朋友之稱也嘗見前輩先進不呼後進字後進固不敢呼先進字也氣類不同者亦不相呼三四十年來先進始有字後進者又觀前輩凡父行父執受拜不跪並酬酢事變劉器之待制云某初登科與二同年謁張觀參政三人同起身請教張曰某自守官以來常持四字曰勤謹和緩中間一後生應聲曰勤謹和既聞命矣緩之一字某所未聞張正色作氣曰何嘗教賢緩不及事且道世間甚事不因忙後錯了童蒙訓問某有一病且如作一簡便須安排言語寫教如法要人傳玩飯一客便要器皿飲饌如法教人感激推此每事皆然先生曰此夸心欲以勝人皆私也作簡請客如法是合做底只下面一句便是病根此病根因甚有只為不合有巳得人道好於我何加孟子謂宫室之美妻妾之奉所識窮乏者得我與皆是有箇夸心又問更有一病稱好則溢美稱不好則溢惡此猶是好惡使然且如今日泥濘只是五寸須説一尺有利害猶且得無利害須要如此此病在甚處曰欲以意氣加人亦是夸心有人做作説話張筋努脈皆為有已又問或曰我初學問事必不當人必笑然我未有所得須直情言之若掩藏畏人笑徒自欺耳此言如何曰是也謂同坐諸子曰亦須切記此語謝子與伊川别一年往見之伊川曰相别又一年做得甚工夫謝曰也只是去箇矜字曰何故曰子細點檢得來病痛盡在這裏若按伏得這箇罪過方有向進處伊川點頭因語在坐同志者曰此人為學切問近思者也余問矜字罪過何故恁地大謝子曰今人做事只管要夸耀别人耳目渾不關自家受用事有底人食前方丈便向人前喫只疏食菜羮却去房裏為甚恁地並上蔡謝氏語録愚柔之質質之不美也以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣愚者自是而不求自私者以天下非吾事懦者甘為人下而不辭有是三者欲身之修未之有也吕藝閣中庸解劉道原之子羲仲本佳近亦變壞楊子雲稱言心聲書心畫羲仲每有書來呼兒輩譯之數四有不能識者字小而暗弱亦其心術之不明類此某每於書畫之間可得其人之大半劉元城語録溫公曰凡觀書當先其文辨其音然後可以求其義今喜以且為言案以且為言者如姑且權且之類是非可否不得所安自墮於小人之偷而愧夫君子之篤敬並眺以道集人須是一切世味淡薄方好不要有富貴相周恭叔才髙識眀初年亦甚好後來只緣纍重若把得定儘長進在昔聞眀道先生一見吕微仲便曰宰相微仲須做只是這漢俗謝上蔡云為他有貴底相態便是俗處王介甫在政事堂只喫魚羮飯因薦兩人不行下殿便乞去云世間何處無魚羮飯為緣它纍輕便去住自在孟子謂堂髙數仞食前方丈侍妾數百人我得志不為學者須先除去此等常自激昻便不到得墜墮常愛諸葛孔眀當漢末自言臣本布衣躬耕南陽茍全性命於亂世不求聞逹於諸侯後來雖應劉先主之聘宰割山河三分天下身為將相手握重兵亦何求不得何欲不遂却與後主言成都有桑八百株田十五頃子弟衣食自有餘饒臣身在外别無調度不别治生以長尺寸若死之日不使廪有餘粟庫有餘財以負陛下及卒果如其言如此輩人真可謂大丈夫矣楊訓同黎才翁侍坐胡文定先生目黎曰為士人當只知窮經問學不須及他事如賢前所言誰又詈罵自家誰又道甚言語如此是自家身心都不用理會只了得與人間爭也孟子曰自反而仁矣自反而有禮矣此物奚宜至哉萬一自家都是亦只得如此待人况罵詈長官親聞乃坐若聽人傳言是來讒賊之口更有何窮已楊訓問胡文定先生避冦諸事如意否先生曰不惟避冦應人切不得望要事事足意得常有些不足處便好人家才事事足意便恰有不好事出陶淵眀為彭澤令不以家纍自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之問人能充無受爾汝之實無所往而不為義爾汝者是相爾汝之小恩愛否曰須是壁立萬仞一介不以取諸人方能如此孟子自有此氣象故説出此等話如我以吾仁我以吾義我所不為皆古之制一聞可使寡人得見之語便更不見大凡事不可放過便受爾汝並胡氏傳家録眺以道篤於親戚故舊及有牽聯之親一日之雅皆委曲敦敘後生從而化者甚衆以道盛文肅家外甥洪炎玉父祖母文城君亦盛氏甥以道於玉父為尊行一日同會京師玉父未及見以道邂逅僧寺中玉父謂以道曰公丈人行也前此未得一見以道遽折之曰某自是公表叔何丈人行之有玉父再三謝之曰是表叔是表叔但某未曽敢敘致爾以此知遊學之士須經中原先逹鉗椎方能有成也吕氏師友雜志國語公父文伯之母告季康子君子能勞後世有繼又謂其子聖王之處民也擇瘠土而處之勞其民而用之故長王天下又曰民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也左傳亦言人生在勤勤則不匱以此知勤勞者立身為善之本不勤不勞萬事不舉今夫細民能勤勞者必無凍餒之患雖不親人人亦親之常懶惰者必有飢寒之憂雖欲親人人亦不用也公父文伯之母與左傳所記皆故家遺俗相傳之語其必自聖人出也然則後生處身居業其可不以勤勞為先而懶惰自棄其身哉古人自奉簡約類非後人所能及如飲食髙下固自有制度諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕此猶是極盛制度也大抵古人得食肉者至少如食肉之祿氷皆與焉肉食者謀之肉食無墨此言貴者方得肉食也莊子九方歅相子綦之子刖而鬻之於齊適當渠公之街然身食肉而終相班超者虎頭燕頷食肉相也以此知古人以食為貴食肉為難得比之後人簡約甚矣春秋以後先王之澤漸逺然善言相傳猶有存者學者得其言猶可詳思而致力也如伍子胥為人剛戾忍詬能成大事趙襄子言君所以能置無恤為能忍詬也如忍詬之道微此數人言之後人不知也莊子稱伊尹強力忍垢亦是道也後世人自處既不厚而輕用其身皆不知忍詬之道也前輩嘗教少年毋輕議人毋輕説事惟退而自修可也學記曰幼者聽而弗問皆使人自修不敢輕發養成德器也鄢陵之戰范丐趨進曰塞井夷竈陳於軍中而疏行首晉椘唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉鄭侵蔡有功鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言之將為戮矣范宣子子産之言皆切論也而文子子國深抑之如此者正恐後生輕發未成德器而先招禍敗卒無以立也故此兩人後來所立如此之逺良由老成教之有素中有所主也紹聖初滎陽公罷經筵舍于京城外華嚴寺俟命者月餘陳無已師道眺伯禹載之唐季實之問皆就華嚴見公亦為公留月餘執事左右如親子弟晨夕皆省揖于寢門之外後人能如此尊事前輩者蓋少矣伊川先生甚愛表記中説君子莊敬日強安肆日偷蓋常人之情放肆則日就曠蕩自檢束則日就規矩並舍人雜録有人問祁寬曰尹和靖先生尋常説今日政事向背當如何寬曰不曽説渠曰賢曽問否寬曰不曽問曰何故不問寬曰先生教人思不出其位不在其位不謀其政安敢問也渠云孔孟何故説寬曰孔孟亦不曽説渠引孔孟之言寬曰此孔孟在其位為司冦齊卿時説底至於答一時君臣問政皆時君大臣問政不得不告也觀孔孟説底危行言孫及不謀其政氣象方其間處必不説也曰如此則先生之學焉用寬曰吾每教人必以君臣父子夫婦兄弟朋友之道必欲君君臣臣父父子子則其論政亦大矣奚必指時事而言書云孝乎惟孝友于兄弟是也一日舉示先生先生曰甚善甚善祁居之尹和靖語録古之號為賢士大夫者必謹乎禮必重乎義必從其厚必本其誠者也嗟今之世則異夫是取其便俗於禮不暇謹志急乎利於義不知重澆薄相師於厚不復從貌諛為敬於誠不必本禮也者貴有别也親戚講拜之禮所以眀尊卑長幼之異豈惟親戚凡居父祖之執亦當受子孫致敬今既論親矣至於致敬則類多交拜尊卑長幼甚矣其無别吉凶禮制人倫所甚重也不宜廢紊今期功至親或以在逺而哀遂不舉或因小隙而不通慰問或乘親喪而殺禮納室或居夫服而暗受聘定憂制在身雖拘法弗仕而不妨公肆宴樂婦女衣裝當其無戚或去華彩逮夫居憂翻忌純素吉凶之禮又如是而廢紊若乃偏親在上子孫或私分産業而弗念奉養有闕尊長病未及絶肉未及寒卑幼有發篋盜匿而弗暇銜哀茹苦骨肉弗睦則絶不往來騰謗揚惡而不少隱及其歡和則尊卑無間必褻狎喧譁而不相避家至豐裕視親戚孤貧而鮮肯賑恤財雖吝嗇施緇黃則甚所甘心自山水之説熾子孫多稽留襄奉廣營宅兆而専希己福自科舉之法壞舉子茍幸中選匿服冒户而弗顧典憲婚姻之家嫌隙已成則逐婦奪女論勢而弗論義交承之間前政不肯遺後政之利後政或多毁前政之短相忌而不相睦學者自非欲得時文速化之術則莫肯從師不知古人從師本以傳授博約為事師者自非得其厚資則弗肯售其時文速化之術不知古人為師本只以教育成才為樂公舉之法久成私恩或徇權要囑託或喜阿諛巧佞或迫親故干懇或與他人互易其最下者乃受賂遺而不耻而覔舉之士或修文贄為勤或借勢力為援或諷士民稱述行績以取信於上或恃親舊稔熟而深切責望其最甚者操持長短而為脅取之計紛紛干求靡所不至其有專修職業而待知己必擇所知而自薦者鮮矣附炎之態則迎意曲合冀蒙親悅逮勢去無望則罷蹤絶迹視猶路人若乃介潔剛方人惡其不入衆以禮自持人笑其徒自苦志大慮逺者例目為狂妄安分守義者悉指謂無能徇人情而多可乃得賢者之稱假公帑以妄施必有美政之譽官職以本實之稱為簡慢而例從過呼書尺以諂諛不情為恭敬而紛紜多幅親戚往來通問未免頌德之言交遊品位微差不復相稱以字以丈相呼輩行莫辨以台相謂貴賤無殊口誦詩書者或行同於市井談論公正者或密趨於偏曲毁譽他人者多徇愛憎而不必有實過尤在身必加文飾而誰肯服理其遊學肄業者不思勉已而常冀異恩其居官任事者績考未立而已希賞典躁進者以交結為必致之資貪墨者恃行賂為救解之術富貴遂意則無復存功業之心官年踰格則鮮肯循告老之制見利必圖其所以得臨難必規其所以避父訓其子兄勉其弟交遊之議論同僚之聚話罔不在兹茍可進身益家弗恤害人蠧國士風之虧禮違義從薄尚偽者如此何以責小民之趨正哉宜乎欺詐攘竊放僻邪侈冒犯法令爭訟繁多而莫能禁止也吾每覽簡牘所記夷考先賢言行無非禮義為歸及觀前輩書尺率皆語簡意盡於交朋則忠告無諂於卑幼則訓誨必嚴其輕重髙下必務得體其敦篤情實自然可慕後進晚生目熟世俗之事耳熟世俗之談恬安所為未嘗疑怪則是陷溺其心然也夫入時愈深則失正愈逺聞吾説者亦可以自警也何德將歎習立身以力學為先力學以讀書為本今取六經及論語孟子孝經以字計之毛詩三萬九千二百二十四字尚書二萬五千七百字周禮四萬五千八百六字禮記九萬九千二十字周易二萬四千二百七字春秋左氏傳一十九萬六千八百四十五字論語一萬二千七百字孟子三萬四千六百八十五字孝經一千九百三字大小九經合四十八萬四千九十五字且以中才為率若日誦三百字不過四年半可畢或以天資稍鈍減中才之半日誦一百五十字亦止九年可畢茍能熟讀而溫習之使入耳著心久不忘失全在日積之功耳里諺曰積絲成寸積寸成尺寸尺不已遂成丈匹此語雖小可以喻大後生勉之鄭氏勤學龜山楊先生見豫作許少伊哀詞云文字間甚能形容少伊但全篇大體似平交哀詞前輩於前後輩之際甚嚴又云有美一人兮豐下而多髯此語固可見其儀形然黃魯直詩玉堂若要真學士須用儋州秃鬢翁此近乎不敬不可學也聞之使人心服陳齊之雜録凡為學之道必先至誠不誠未有能至焉者也何以見其誠居處齊莊志意凝定不妄言不茍笑開卷伏讀必起恭敬如對聖賢掩卷沉思必根義理以間邪僻行之悠久習與性成便有聖賢前輩氣象凡勤學須是出於本心不待父母先生督責造次不忘寢食在念然後見功茍有人則作無人則輟此之謂為父母先生勤學非為己修終無所得凡讀書必務精熟若或記性遲鈍則多誦遍數自然精熟記得堅固若是遍數不多只務強記今日成誦來日便忘其與不曽誦讀何異凡見人有一行之善則當學之勿以其同時同處貴耳賤目焉並髙登彥先修學門庭
