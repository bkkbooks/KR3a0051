body:
  text: 提要少儀外𫝊二卷儒家類臣等謹案少儀外𫝊二卷宋吕祖謙撰祖謙有古周易已著録是書末有雲谷胡巖起跋及其弟祖儉後序丹陽譚元猷嘗刻之於學宫嵗乆散佚久無刋本故朱􅂜尊經義考注曰未見此本載永樂大典中尚端末完整無所訛缺今仍釐為二卷以還其舊其書為訓課㓜學而設故取禮記少儀為名然中間襍引前哲之懿行嘉言兼及扵立身行已應世居官之道所該繁富不専主扵灑掃進退之末節故命之曰外𫝊猶韓嬰引事説詩自題曰外𫝊云爾吕本中舊有童蒙訓皆自為誥誡之語此書則採輯舊文體例近朱子小學小學盛行於世童蒙訓亦有刋本而此本淹没不彰盖書之𫝊不𫝊亦有幸不幸焉未可以是定優劣也永樂大典别載辨志録二卷亦題吕祖謙撰其文全與此同盖一書二名編纂者不出一手因而兩收今附著于此不復重録其文亦不復别存其目焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0f6779492d93f2adac0fdcddc37a053d88d457e07c52299fae267b034a0f621f
