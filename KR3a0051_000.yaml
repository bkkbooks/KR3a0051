body:
  text: 提要少儀外傳二卷儒家類臣等謹案少儀外傳二卷宋吕祖謙撰祖謙有古周易已著録是書末有雲谷胡巖起跋及其弟祖儉後序丹陽談元猷嘗刻之於學宫嵗久散佚久無刋本故朱彝尊經義考注曰未見此本載永樂大典中尚端末完整無所訛缺今仍釐為二卷以還其舊其書為訓課幼學而設故取禮記少儀為名然中間雜引前哲之懿行嘉言兼及于立身行已應世居官之道所該繁富不専主于灑掃進退之末節故命之曰外傳猶韓嬰引事説詩自題曰外傳云爾吕本中舊有童蒙訓皆自為誥誡之語此書則採輯舊文體例近朱子小學小學盛行於世童蒙訓亦有刋本而此本淹沒不彰蓋書之傳不傳亦有幸不幸焉未可以是定優劣也永樂大典别載辨志録二卷亦題吕祖謙撰其文全與此同蓋一書二名編纂者不出一手因而兩收今附著于此不復重録其文亦不復别存其目焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:73f6f38c2484c1c931b8058dad4fe89b99cbc8384d49875f078ea02f8b38b61c
