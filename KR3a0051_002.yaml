body:
  text: 少儀外傳卷下宋吕祖謙撰吾黨訓子弟當先趨向如義利之間内外之分不可不辨夫不使先求在我者而遽使之求在外者豈賢父兄所以養子弟者哉陸子夀書持身以清潔處心以公平勿使婦人預外事擇師教子學未成勿使應科舉處庠序衣服噐用皆出中制稱家有無濟䘏孤貧謹慶弔之禮無蓄異物珍寳美妾少僕接賔客以和睦待奴婢以寛恕治家十事楚人有善相人所言無遺䇿聞於國荘王見而問之對曰臣非能相人能觀人之交也布衣也其交皆孝悌篤謹畏令如此者其家必日益身必日安此所謂吉人也官事君者也其交皆誠信而好善如此者事君日益官軄日進此所謂吉人也臣非能相人能觀人之交也新序父母正則子孫孝慈是以孔子家兒不知罵曽子家兒不知怒所以然者生而善教也説苑丙吉子顯甘露中有罪削爵為闗内侯始顯少為諸曹嘗從祠髙廟至夕牲日乃使出取齊衣丞相吉大怒謂其夫人曰宗廟至重而顯不敬慎亡吾爵者必顯也夫人為言然後乃已前漢書茅容字季偉陳留人也年四十餘耕於野時與等軰避雨樹下衆皆夷倨相對容獨危坐愈恭郭林宗行見之而竒其異遂與共言因請寓宿旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德後漢書青州人隠蕃逃犇入吳朱據郝普數稱蕃有王佐之才車馬雲集賔客盈堂潘濬子翥亦與蕃周旋饋餉之濬聞大怒䟽責翥曰吾受國厚恩志報以命爾軰在都當念恭順親賢慕善何故與降虜交以糧餉之在逺聞此心震面熱惆悵累旬䟽到急就徃使受杖一百促責所餉當時人咸恠之頃之蕃謀作亂於吳事覺亡走捕得伏誅吳主切責郝普普惶懼自殺朱據禁止歴時乃解卞蘭苦酒消渇時魏明帝信巫女用水方使人持水賜蘭蘭不肯飲詔問其意蘭言治病自當以方藥何信於此帝為變色而蘭終不服並三國志桓常侍聞人道深公者輒曰此公既有宿名加先逹知稱又與先人至交不冝談桓常侍桓彝也深公是僧法深也案世説作不冝説之王長豫為人謹順事親盡色養之孝丞相還臺及行未嘗不送至車後常與曹夫人摒擋箱箧長豫亡後丞相還臺登車後哭至臺門曹夫人作簏封而不忍開劉真長王仲祖共行日旰未食有相識小人貽其餐肴案甚盛真長辭焉仲祖曰聊以充虚何苦辭真長曰小人都不可與作縁孫興公作庾公誄文既成示庾道恩庾見慨然送還之曰先君與君自不至於此綽集載誄文曰咨予與公風流同歸擬量託情視公猶師君子之交相與無私虚中納是吐誠誨非雖實不敏敬佩弦韋永戢話言口誦心悲禇大傅南下孫長樂於船中視之言次及劉真長死孫流涕因諷詠曰人之云亡邦國殄瘁禇大怒曰真長平生何嘗相比數而卿今日作此面向人並世説梁賀琛奏今天下守宰所以貪殘良由風俗侈靡使之然也今之燕喜相競誇豪積果如邱陵案賀琛傳作積果如山岳列肴同綺繡露臺之産不周一燕之資而賔主之間裁取滿腹未及下堂已同臭腐為吏牧民者致貲巨億罷歸之日不支數年率皆盡於燕飲之物歌舞之具所費事等邱山為歡止在俄頃乃更追恨向所取之少如虎傅翼増其搏噬一何悖哉梁書案梁書原本悞作南史南史琛傳無此文今改正又此條之末原本有夫失節之嗟亦民所自患正耻不能及羣故勉強而為之二十二字其語雖亦見于琛傳而與此條文不相属盖此條本節錄琛奏非其原文抄錄之時偶削除不盡誤及旁文耳今亦刪去魏左將軍李栗性簡慢常對道武舒放不肅咳唾任情道武積其宿過遂誅之北史顧愷之嘗執命有定分非智力所移唯應恭己守道信天任運而闇者不逹妄意徼倖徒虧雅道無闗得䘮乃以其意命弟子愿作定命論南史齊文宣帝怒臨漳令嵇曄舍人李文師以賜臣下為奴中書侍郎鄭頥私謂祠部尚書王昕曰自古無朝士為奴者昕曰箕子為之奴頥以白帝曰王元景比陛下於紂帝銜之帝與朝臣酣飲昕稱疾不至帝遣騎執之昕方揺膝吟詠遂斬於前殿畢義雲作書與髙元海論叙時事元海入宮不覺遺之給事中李孝貞得而奏之帝由是踈元海和士開復譛元海帝以馬鞭箠元海六十出為兖州刺史並北史鄭餘慶不事華潔後進趨其門者多垢衣敗服以望其知而武儒衡謁見未嘗輒易所好但與之正言直論餘慶因亦重之敬宗時裴度自興元入覲既至而朝士持兩端者日擁度門一日度留客命酒劉栖楚矯求度之歡曲躬附裴耳而語崔咸嫉其矯舉爵罰度曰丞相不當許所由官囁耳語度笑而飲之栖楚不自安趨出坐客皆壯之王仲舒韋成季呂洞軰為郎官朋黨輝赫日㑹聚歌酒慕李藩名強致同會藩不得已一至仲舒軰好為訛語俳戯後召藩堅不去曰吾與仲舒軰終日不曉所與言何也後果敗並舊唐書笞怒廢於家則豎子之過立見刑罰不中則民無所措手足治家之寛猛亦猶國焉梁孝元世有中書舍人治家失度而過嚴刻妻妾遂共貨刺客伺醉而殺之也世間名士但務寛仁至於飲食饟饋童僕减損施惠然諾妻子節量狎侮賔客侵耗鄉黨此亦為家之巨蠧矣齊吏部侍郎房文烈未嘗嗔怒經霖雨絶糧遣婢糴米因爾逃竄三四許日方復擒之房徐曰舉家無食汝何處來竟無捶撻嘗寄人宅奴婢徹屋為薪略盡聞之嚬蹙卒無一言昔劉文饒不忍罵奴為畜産今世愚人遂以相戯或有指名為豚犢者有識傍觀猶欲掩耳況當之者邪自古文人多䧟輕薄原其所積文章之體標舉興㑹發引性靈使人矜伐今世文士此患彌切一事偶當一句清巧神厲九霄志凌千載不覺更有傍人加以砂礫所傷慘於矛㦸諷刺之禍速乎風霆深宜防慮以保元吉學問有利鈍文章有巧拙鈍學累功不妨精熟拙文研思終歸蚩鄙但成學士自足為人必乏天才勿強操筆吾見世人至無才思自謂清華流布醜拙亦已衆矣治㸃子弟文章以為聲價大弊事也一則不可常繼終露其情二則學者有憑益不精勵吾家巫覡禱請絶於言議符書章醮亦無析焉汝曹所見也勿為妖妄之費真草書跡江南承晉宋餘俗相與事之然此藝不須過精夫巧者勞而智者憂常為人所役使更覺為累韋仲将遺戒深有以也王逸少風流才士蕭散名人舉世唯知其書翻以能自蔽也蕭子雲每歎曰吾編齊書自謂可觀唯以筆迹得名亦異事也王襃地胄清華才學優敏後雖入闗亦被禮遇猶以書工﨑嶇碑碣之間辛苦筆硯之役嘗悔恨曰假使吾不知書可不至今日邪以此觀之慎勿以書自命治家可儉而不可吝也儉者省約為禮之謂也吝者窮急不恤之謂也生民之本要當稼穡而食桑麻以衣蔬果之蓄園場之所産雞豚之膳塒圏之所生爰及棟宇器械樵蘇脂燭莫非種植之物也至能守其業者閉門而為生之具已足但家無鹽井耳今北土風俗率能躬儉節用以贍衣食江南奢侈多不逮焉門不停賔古所貴也失教之家閽寺無禮或以主君寢食嗔怒拒客未通江南深以為耻黄門郎裴之禮好待賔客或有此軰對賔杖之其門生僮僕接於他人折旋俯仰辭色應對莫不肅敬與主無别也江南朝士因晉中興而渡江本為覊旅至今八九世未有力田悉資俸禄而食耳假令有者皆信僮僕為之未嘗目觀起一墢土耘一株苖不知㡬月當下㡬月當收安識世間餘務乎故治官則不了營家則不辦皆優閑之過也君子當守道崇徳蓄價待時爵禄不登信由天命須求趨競不顧羞慙比較才能斟量功伐厲色揚聲東怨西怒或有刼持宰相瑕疵覬獲酬謝或有諠聒時人視聽求見發遣以此得官謂為才力何異盗食致飽竊衣取温哉世見躁競得官者便謂弗索何獲不知時運之來不求亦至矣見静退未遇者便謂弗為胡成不知風雲不興徒求無益也凡不求而得者焉可勝算乎並顔氏家訓張霸卒遺敕諸子曰人生一世但當畏敬於人若不善加已直為受之後漢書正獻公平日未嘗較曲直聞謗未嘗辯也少時書於座右曰不善加己直為受之蓋其初自懲艾也如此童䝉訓嚴彭祖遷太子太傅亷直不事權貴或説曰天時不勝人事君以不脩小禮曲意亡貴人左右之助經誼雖髙不至宰相願少自勉彊彭祖曰凡通經術固當脩行先王之道何可委曲而從俗茍求富貴乎彭祖竟以太傅官終漢書儒林傳范子夷説仲尼聖人也纔作陪臣顔子大賢也簞食瓢飲後之人不及孔顔者逺矣而常歎仕宦不逹何愚之甚若能以自已官爵比之孔顔僥倖甚矣舍人雜説當官之法唯有三事曰清曰慎曰勤知此三者則知所以持身矣知此三者可以保禄位可以逺耻辱可以得上之知可以得下之援然世之仕者臨財當事不能自克常自以為不必敗持不必敗之意則無所不為矣然事常至於敗而不能自保故設心處事戒之在初不可不察借使役用權智百端補治幸而得免所損己多不若初不為之為愈也司馬子微坐忘論云與其巧持於末孰若拙戒於初此天下之要言也當官䖏事之大法用力簡而見功多無如此言者人能思之豈復有悔吝耶事君如事親事官長如事兄與同僚如與家人待群吏如待奴僕愛百姓如愛妻子䖏官事如䖏家事然後為能盡吾之心如有毫末不至皆吾心有所未盡也故事親孝故忠可移於君事兄弟故順可移於長居家理故治可移於官豈有二理哉范侍郎育作庫務官隨時箱籠只置㕔事上以防疑謗凡若此類皆守官所宜詳知也當官者勿辭迂謹而深避嫌疑以至誠待人而深避文法如此則可以免當官者凡異色人皆不冝與之相接巫祝尼媪之類尤冝踈絶要當以清心省事為本當官者先以暴怒為戒事有不可當詳䖏必無不中若先暴怒只能自害豈能害人前軰嘗言凡事只怕待待者詳䖏之謂也盖詳䖏之則思慮自出人不能中傷也當官䖏事務要著實如塗擦文書追改日月重易押字萬一敗露得罪反重亦非所以養誠心事君不欺之道也百種姦偽不如一實反覆變詐不如慎始防人疑衆不如自慎智數周宻不如省事不易之道也當官既自亷潔又須闗防小人如文字厯引之類皆須明白以防中傷不可不致慎不可不詳知也已上並童䝉訓為政要得厲威嚴使事事齊整甚易但失於不覺便不是古人作䖏孔子言居上不寛吾何以觀之哉又曰寛則得衆若使寛非常道聖人不只如此説了今人只要事事如意故覺見寛政悶人不知權柄在手不是使性氣䖏何嘗見百姓不畏官但見官人多虐百姓耳然寛亦須有制始得若百事不管唯務寛大則胥吏舞文弄法不成官府須要權常在己操縱予奪揔不由人儘寛不妨龜山語録萬事真實有命人力計較不得吾平生未嘗干人在書局亦不謁執政或勸之吾對曰他安能陶鑄我自有命在若信不及風吹草動便生恐懼憂喜枉做却閑工夫枉用却閑心力信得命及便養得氣不折挫上蔡謝氏語録滎陽公在維揚時東萊公為曹官所居廨舍無几案以竹縳架上置書冊噐皿之屬悉不能具䖏之甚安其簡儉如此吕氏雜記蘇丞相子容知亳州有豪民婦被罪當杖以病未科每旬檢校未愈鄧元孚為譙縣簿謂其子曰尊公髙明平昔以政事稱今豈可為一豪婦人所紿公為賢子不可不白但諭醫者如法檢校彼自不誣矣其子白之公曰萬事付公議何容心焉若言語輕重則人有觀望或有可悔既此婦死元孚大慙服曰某軰狭小豈可測公之用心也蘇氏談訓後生少年乍到官守多為猾吏所餌不自省察所得毫末而一任之間不復敢舉動大抵作官嗜利所得甚少而吏人所盗不貲矣以此被重譴良可惜也舍人雜録徐仲車先生為楚州教授嘗言事各有所主不得相侵某借書必白經諭有急故留門必白直學不敢自專也徐仲車先生嘗言人之同官不可不和和則事無乖逆而下不能為姦必欲和莫若分過而不掠美並徐仲車語録吕文穆不喜記人過初叅知政事入朝堂有朝士於簾内指之曰是小子亦叅政耶文穆佯為不聞而過之其同列怒令詰其官位姓名文穆遽止之罷朝同列猶不能平悔不窮問文穆曰若一知其姓名則終身不能復忘固不如毋知也且不問之何損時皆服其量涑水記聞范子夷嘗言其家家學不卑小官居一官便盡心治一官之事只此便是學聖人也若以為州縣之軄徒勞人耳非所以學聖人也程氏遺書李公擇尚書家嘗置聲妓孫中丞莘老不以為然滎陽公曰此莫是小節否孫中丞曰此一節亦不小崇寕初衣服皆尚窄䄂狭縁有不如是者皆取怒於時故當時章䟽有言襃衣博帯尚存元祐之風矮帽幅巾猶襲姦臣之體盖東坡喜戴矮帽當時謂之東坡帽黄魯直喜戴幅巾故言襲姦臣之體也韓子蒼大觀間嘗贈予外弟蔡伯世詩云秃巾小帽紛紛是眼眀見此襃衣士秃巾小帽皆當時浮薄子所尚闗正叔既被召衣服不改舊或問之曰正叔若登對衣服當如何正叔曰衣帛帛見衣褐褐見並舍人雜記孔頴逹䟽曰䜛言之起由數問小事於小人孔頴逹詩正義問荆公勿使上知之語信乎曰須㸔他當時因甚事説此話且如作此事當如何更須詳審未要令上知之又如説一事未甚切當更須如何商量體察今且勿令上知若此類不成是欺君也凡事未見始末更切子細反覆推究方可程氏遺書范子夷説其祖作外任官時與京中人書言居京慎勿竊論曲直不同任言官時取小名受大禍因言吾徒相見正當論行己立身之事耳舍人雜説齊之季世多以財貨託附外家諠動女謁拜守宰者印組光華車騎輝赫榮兼九族取貴一時而為執政所患隨而伺察既以利得必以利殆縱得免死莫不破家然後噬臍亦復何及顔氏家訓夫門地髙者一事墜先訓則異他人雖生可以茍爵位死不可見祖先地下門髙則自驕族盛則人窺嫉實藝懿行人未必信纎瑕㣲累十手争指矣所以脩己不得不至為學不得不堅夫士君子生於世己無能而望於他人用己無善而望他人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎予㓜嘗聞先僕射言立己以孝弟為基恭黙為本畏法為務勤儉為法肥家以忍順保交以簡恭廣記如不及求名如儻来莅官則潔已省事而後可以言家法家法備然後可以言養人直不近禍亷不沽名憂與禍不偕潔與富不並董生有云弔者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故世族久近與命位豐約不假問蓍龜星數在䖏心行事而已昭國里崔山南琯子孫之盛仕族罕比山南曽祖母長孫夫人年髙無齒祖母唐夫人事姑孝毎旦櫛縰笄拜階下升堂乳姑長孫不粒食者數年一日病言無以報吾婦冀子孫皆得如婦孝然則崔之門安得不大乎東都仁和里裴尚書寛子孫衆盛實為名閥天后時宰相魏元同選尚書之先為壻未成婚而魏䧟羅織獄家徙嶺表及北還女已踰笄其家議無以為衣食資願下髮為尼有一尼自外至曰汝福厚豐必有令匹子孫将徧天下宜北歸家人遂不敢議及荆門則裴齎装以迎矣今勢利之徒捨信誓如反掌則裴之蕃衍乃天之報施也予舊府髙公先君兄弟三人俱居清列非速客不二羮胾夕食齕蔔瓠而已皆保重於世永寕王相國涯居位竇氏女歸請曰玉工貨釵直七十萬錢王曰七十萬錢豈於汝惜但釵直若此乃妖物也禍必隨之女不復敢言後釵為馮球外郎妻首飾王聞之曰外郎有七十萬錢其可久乎馮為賈相國餗門人賈有奴頗横馮愛賈召奴責之奴泣謝未㡬馮晨謁賈賈未出有二青衣齎銀罌出曰公恐君寒奉地黄酒三盃馮悦盡舉之俄病渇且噎因暴卒賈為歎息出涕卒不知其由明年王賈皆遇禍噫王以珍玩為物之妖信知言矣而不知恩權隆赫之妖甚於物耶馮以卑位貪貨不能正其家忠於所事不能保其身不足言矣賈之奴害客於牆廡間而不知欲始終冨貴其得乎舒相國元輿與李繁有隙為御史鞫譙獄窮致繁罪後舒亦及禍今世人盛言宿業報應曽不思視履考祥事歟夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛予家本以學識禮法稱於士林比見諸家於吉凶禮制有疑者多取正焉䘮亂以來門祚衰落基業之重屬於後生夫行道之人徳行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏雨所不能活也至於孝慈友悌忠信篤行乃食之醯醤可一日無哉栁氏家訓見與董生論周易九六義取老而變以為畢中和承一行僧得此説異孔頴逹䟽而以為新竒彼畢子董子何膚末於學而遽云云也都不知一行僧承韓氏孔氏而果以為新竒不亦可笑矣哉何畢子董子之不視其書而妄以口承之也君子之學将有以異也必先䆒窮其書䆒窮而不得焉乃可以立而正也今二子尚未能讀韓氏注孔氏正義是見其道聽途説者又何能知所謂易者哉栁文與劉禹錫書唐僕射栁仲郢鎮郪城有婢失意於成都鬻之刺史盖巨源案盖巨源原本作藍巨源今考北夢𤨏言及李昉太平廣記所引均作盖巨源今改正西川大校累典大郡居苦竹溪女儈以婢導于巨源備賞技巧他日巨源窺牕栁婢侍左通衢有鬻綾羅者召俾就宅盖於束縑内選擇邉幅舒卷揲之第其厚薄酬酢可否栁婢失聲而仆似中風命扶之而去都無言促令輿還女儈家翌日而瘳詰其所苦青衣曰雖賤人曽為栁家細婢死矣安能事賣綾絹牙郎乎蜀都聞之皆嗟歎清族之家率由禮則出北夢𤨏言孔戡於為義若嗜欲勇不顧前後於利與禄則畏避退䖏如怯夫然韓文有貨玉帶者王文正弟以呈文正文正曰如何弟曰甚佳公命繋之曰還見佳否弟曰繋之安得自見文正曰自負重而使觀者稱好無乃勞乎我腰間不稱此物亟還之故平生所服止於賜帯王文正公毎見家人服飾似過即瞑目曰吾門素風一至於此亟令减損故家人或有一衣稍華必於閨内易之不敢令公見焉並名臣遺事范文正公與朱氏姪書曰汝守官䖏事小心不得欺與同官和睦盡禮有事只與同官議莫與公人商量莫縱鄉親來部下興販自家且一向清心做官莫營私利汝㸔老叔自來如何還曽營私否自家好家門各為好事以光祖宗范文正公文鄧州花蠟燭名著天下雖京師不能造相傳云是㓂萊公燭法公嘗知鄧州而自少年冨貴不㸃油燈尤好夜宴劇飲雖寢室亦然燭逹旦毎罷官去後人至官舍見厠溷間燭淚在地徃徃成堆杜祁公衍為人清儉在官未嘗然官燭油燈一炷熒然欲㓕與客相對清談而已二公皆為名臣而奢儉不同如此然祁公夀考終吉萊公晚有南遷之禍遂殁不反雖其不幸亦可以為戒也歸田録梁昭明太子𦵏其母丁貴嬪遣人求墓地之吉者或賂宦者俞三副求賣地云若得錢三百萬以百萬與之三副宻啓上言太子所得地不如今地於上為吉上年老多忌即命市之𦵏畢有道士云此地不利長子若厭之或可申延乃為蠟鵝及諸物埋於墓側長子位宫監鮑邈之魏雅初皆有寵於太子邈之晩見踈於雅乃宻啟上云雅為太子厭禱上遣檢掘果得鵝物大驚将窮其事徐勉固諫而止但誅道士由是太子終身慙憤不能自明及卒上徴其長子南徐州刺史華容公歡至建康欲立以為嗣銜其前事猶豫久之卒不立庚寅遣還鎮司馬光曰君子之於正道不可少頃離也不可跬歩失也以昭明太子之仁孝武帝之慈愛一染嫌疑之迹身以憂死罪及後昆求吉得㐫不可湔滌可不戒哉是以詭誕之士竒邪之術君子逺之朱全忠嘗與僚佐及遊客坐於大栁之下全忠獨言曰此木宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生軰好順口玩人皆此類也車轂須用夹榆栁木豈可為之顧左右曰尚何待左右數十人捽言宜為車轂者悉撲殺之並通鑑夫人爪牙之利不及虎豹膂力之強不及熊羆奔走之疾不及麋鹿飛颺之髙不及燕雀茍非群聚以禦外患則久為異類食矣是故聖人教人以禮使知父子之親人知愛其父則知愛其兄弟矣知愛其祖則知愛其宗族矣如枝葉之附於根榦手足之繋於身首不可離也豈徒使其粲然條理以為榮觀哉實欲使相為依庇以扞外患也聖人知一族不足以獨立也故又為之甥舅婚媾姻婭以輔之猶懼其未也故又慈養百姓以衛之故愛親者所以愛其身也愛民者所以愛其親也如是則其身安如泰山夀如箕翼他人安得而侮之哉故自古聖賢未有不先親九族然後能施及他人者彼愚者則不然弃其九族逺其兄弟欲以專利其身殊不知身既孤人斯戕之矣於利何有哉故世之人欲愛其身而弃其宗烏在其能愛身也孔子曰均無貧和無寡安無傾善為家者盡其所有而均之雖糲食不飽弊衣不完人無怨矣夫怨之所生生於自私及有所厚薄也漢世諺曰一尺布尚可縫一㪷粟尚可舂言尺布可縫而共衣㪷粟可舂而共食譏文帝以天下之冨不能容其弟也今之為後世謀者不過廣營生計以遺之田疇連阡陌邸肆跨坊曲粟麥盈囷倉金帛充箧笥慊慊然求之猶未足施施然自以為子子孫孫累世用之莫能盡也然不知以義方訓其子以禮法齊其家自於十數年中勤身苦體以聚之而子孫以嵗時之間奢靡遊蕩以㪚之反笑其祖考之愚不知自娛又怨其吝嗇無恩於我而厲之也始則欺紿攘竊以充其欲不足則立約舉債於人以俟其死而償之觀其意惟患其祖考之夀也甚者至於有疾不療隂行酖毒亦有之矣然則向之所以利後世者適足以長子孫之惡而為身禍也頃嘗有士大夫其先亦國朝名臣也家甚富而尤吝嗇斗升之粟尺寸之帛必身自出納鎻而封之晝則佩鑰於身夜則置鑰於枕下病甚困絶不知其子孫竊其鑰開藏室發箧笥取其資財其人復蘇即捫枕下求鑰不得憤怒遂卒其子孫不哭相與爭匿其財遂致鬭訟其䖏女亦䝉首執牒自訴於府以爭嫁資為鄉黨笑蓋由子孫自㓜及長惟知有利不知有義故也夫生生之資固人所不可無然勿求多餘多餘希不為累矣使其子孫果賢邪豈䟽糲布褐不能自營死於道路乎若其不賢邪雖積金滿室又奚益哉故多藏以遺子孫吾見其愚之甚也並温公家訓伯淳作縣常於座右書視民如傷四字云某毎日常有媿於此觀其用心應是不錯决撻了人古人於民若保赤子為其無知也常以無知恕之則雖有可怒之事亦無所施其怒無知則固不察其利害所在教之趨利避害全在保者今赤子若無人保則雖有坑穽在前蹈之而不知故凡事疑有後害而民所見未到者當與他做主始得州縣近令勸誘冨民買鹽勸誘百姓名一入官以後便不可脱為民父母豈可暫時罔之使之終身受其害予嘗為泰州獄掾顔岐夷仲以書勸予治獄次第毎一事冩一幅相戒如夏日取罪人早間在東廊晚間在西廊以避日色之類又如獄中遣人勾追之類必使之畢此事不可更别遣人恐其受賂己足不肯畢此事也又如監司郡守嚴刻過當者須平心定氣與之委曲詳盡使人相從而後已如未肯從再當如此詳之其不聼者少矣童䝉訓案今本吕氏童䝉訓無此二條此題童䝉訓似誤歩隲與衛旌俱以種𤓰自給㑹稽焦征𦍑郡之豪族人客放縱乃共修刺奉𤓰以獻征𦍑方在内卧駐之移時旌欲委去隲止之曰本所以來畏其强也而今舍去欲以為髙祗結怨耳良久征𦍑開牖見之身隠几坐帳中設席置地坐隲旌於牖外旌愈耻之隲辭色自若征𦍑作食身享大案殽膳重㳫以小盤飯與隲旌惟菜茹而已旌不能食隲極飯致飽乃辭出旌怒隲曰何能忍此隲曰吾等貧賤是以主人以貧賤遇之固其宜也當何所耻三國志范雲少與領軍長史王畡善雲起宅新成移家始畢畡亡於官舍屍無所歸雲以東廂給之移屍自門入躬自營含招復如禮時人以為難南史李翛尹京兆荘憲太后崩為山陵橋道置頓使嗇官費物物裁損靈駕至㶚橋從官多不得食始議更造渭城門計錢三萬翛以為勞不聴使鑿軌道深之柱危不支方過䘮而門壊輼輬僅免徹門乃得行翛妄奏車軸折山陵使李逄吉劾罔上請免官唐書王羆性儉率嘗有臺使至羆為設食使乃裂去薄餅縁羆曰耕種收穫其功已深舂爨造成用力不少爾之選擇當是未饑命左右撤去之使者愕然大慙北史劉器之建中崇寕初知潞州部使者觀望治郡中事無巨細皆詳考然竟不得毫髮過徃驛劵亦無違法與者部使者亦歎服之後居南京有府尹取兵白直厯㸃磨他寓居無有不借禁軍者獨器之未嘗借一人其廉慎如此峭直深刻之人明習法令所以檢䕶其身可使無過此其所長然卒有其所長以把持窺刺為心一二聴之使人𥚹廹不容茍善其刻而用其深則必置人主於有過之地士有負俗之累而其心坦明出於愷悌不肯欺負人主以賊其民與彼刻深之人相去萬萬豈可以有瑕之玉而置於碔砆之下乎取人於上者将何擇哉陳了翁集賞必當功罰必當罪刻核之論也罪疑惟輕功疑惟重君子長者之心也以君子長者之心則自無刻核之論如君子不盡人之歡不竭人之忠去其臣也必可使復仕去其妻也必可使復嫁如此等論上下薰蒸則太平之功可立致也芝草生甘露降醴泉出皆是此等和氣薫蒸所生舍人雜録發人私書拆人信物深為不徳甚者遂至結為仇怨余得人所附書物雖至親卑㓜者亦未嘗輒留必為附至及人託於某䖏問訊干求若事非順理而已之力不及者則可至誠面却之若己諾之矣則必須逹所欲言至於聴與不聴則在其人凡與賔客對坐及徃人家見人得親戚書切不可徃觀及注目偷視若促膝並坐目力可及則歛身而退候其收書方復進以續前話若其人置書几上亦不可取觀須俟其人云某所恵書云云足下請觀之方可一㸔若書中説事無大小以至戯謔之語皆不可於他䖏復説凡入人家切不可於几案上及書􅀈等内翻㸔人家書簡及記事冊子錢糓文簿若人将文字令己㸔切不可於背後觀皆無徳之一端也凡借一物上至書冊下至器用茍得已者則不須借若不獲己則須愛䕶過於己物㸔用才畢便即歸還切不可以借為名意在没納及不加愛惜至有損壞大率豪氣者於己之物多不自愛惜借人物豈可亦如此此非用豪氣之所乃無徳之一端也凡飲食蒸餅去皮饅頭去蔕肉去脂皮之類皆非成人所為乃癡騃無知而已自非生硬臭惡與犯己宿疾之物豈有不可食之理凡與人同坐夏則已擇涼䖏冬則已擇暖䖏及與人共食多取先取皆無徳之一端也范益謙自戒郭逵為西帥王韶初以措置西事至邉逵知其必生邉患用備邉財賦事連商賈移牒取問韶讀之怒形顔色擲牒于地者久之乃徐取納懷中入而復出對使者碎之逵奏其事上以問韶韶以元牒繳進無一損壞上不悟韶計不直逵言自後逵論韶並不報而韶遂得志矣予舊見前軰語及此事無不切齒而新進小生徃往以此談韶不容口近有一士人自言久遊太學論及韶行事亦以此為智數過人而不以罔上䧟老成罪韶徃者茍合干進者持此自售亦不足怪不謂經此大變故猶守舊聞如此等軰真是不識濁淨其可責哉陳齊之雜録親友之廹危難也家財己力當無所吝若横生圖計無禮請謁非吾教也顔氏家訓黄髮之人五臓氣虚精神耗竭若稍失節宣即動成危瘵盖老人勌惰不能自調在人資飬以延遐筭為人子者深宜察其寒温審其饘藥依四時攝飬之方順五行休王之氣恭恪奉親慎無懈怠春屬木主發生春肝氣王肝屬木其味酸木能勝土土屬脾主甘當春之時其飲食之味宜减酸益甘以養脾氣肝氣盛者調吹氣以利之順之則安逆之則少陽不生肝氣内變春時陽氣初昇萬物萌發正二月間乍寒乍熱髙年之人多有宿疾春氣所攻則精神昏倦宿患發舉又復經冬已來擁爐薫衾㗖炙飲熱至春成積多所發泄致體熱頭昏膈壅涎𠻳四肢勞倦腰脚不任皆天所發之疾也常宜體候若稍覺微疾不可便行踈利恐傷臟腑别生餘疾若别無疾狀或只選食治方中稍涼利飲食調停與進不須服藥常擇和暖日引侍尊親於園亭樓閣虚敞之䖏使放意登眺用攄滯懐以暢生氣時尋花木遊賞以快其意不令孤坐獨眠自生鬰悶春時若親朋請召老人意欲從歡任自遨遊常令的親侍從惟酒不可過飲春時人家多造冷饌米食等不令下與如水團粽粘冷肥膩之物多傷脾胃難得消化大不益老人切宜㸔承春時遇天氣頓暖不可頓减綿衣縁老人氣弱骨踈風冷易傷纔至春時但令多着夹衣遇暖之時一重重漸减不致暴傷也夏屬火主於長飬夏心氣王心主火能剋金金屬肺肺主辛其飲食之味當夏之時宜减苦増卒以飬肺氣心氣盛者調呵氣以踈之順之則安逆之則太陽不長心氣内潰盛夏之月最難調攝隂氣内伏暑毒外蒸縱意當風任性食冷故人多有飱泄之患况是老人尤宜保輔若簷下衖道穿隙破窓皆不可納涼此為賊風中人最毒宜居虚堂凈室水次木隂潔淨之䖏自有清涼毎日凌晨進温平順氣湯一服飲食温軟不令太飽並飬老奉親書江南風俗兒生一期為製新衣盥浴装飾男則用弓矢紙筆女則刀尺鍼縷並加飲食之物及珍寳服玩置之兒前觀其發意所取以驗貪亷愚智名之為試兒親表聚集致燕享焉自兹以後二親若在毎至此日常有酒食之事而無教之徒雖已孤露其日皆為燕飲酣暢聲樂不知有所感傷顔氏家訓世間大有病人親朋故舊交遊來問疾其人曽不經一事未讀一方自騁了了詐作明能談説異端或言是虚或道是實或云是風或云是蠱或道是水或云是痰紛紜謬説種種不同破壊病人心意不知孰是遷延未就時不待人欻然致禍各自散走是故大須好人及好名醫識病深淺探賾方書博覧古今是事明解者㸔病不爾大誤人事孫思邈千金方言及先人理當感慕江南人事不獲已須言閥閲必以文翰罕有面論者北人無何便爾説話及相訪問如此之事不可加於人也若言須及者則斂容肅坐世父叔父兄弟各以尊卑輕重為容色之節皆變於常江南凡弔者識輕服而不識主人則不於㑹所而弔他日脩名詣其家隂陽説云辰為水墓又為土墓故不得哭王充論衡云辰日不哭哭則重䘮今無教者辰日有䘮不問輕重舉家清謐不敢發聲以辭弔客道書又曰晦歌朔哭皆當有罪天奪之筭喪家朔望哀感彌深寕當惜夀又不哭也江左朝臣子孫初釋服朝見二宫皆當泣涕二宫為之改容頗有膚色充澤無哀感者梁武薄其為人多被抑退裴政出服問訊武帝貶瘦枯槁涕泗滂沱武帝目送之曰裴之禮不死也偏傍之書死有歸煞子孫逃竄莫肯在家畫瓦書符作諸厭勝䘮出之日門前然火户外列灰祓送家鬼章斷注連凡如此者不近人情乃儒雅之罪人弹議所當加也並顔氏家訓胡文定問楊訓相知訓言楊宋臣愷悌君子既而宋臣受總司差權湘潭令大熱中之官遇疾而終訓請先生言於總司保任為没於王事先生曰宋臣固可傷然凡事不必如此計較君子愛人以徳使宋臣在决不喜為此等事賢能教飬其孤足矣胡氏傳家録𦵏者人生之大事死者以窀穸為安宅死而未𦵏猶行而未得其歸也是以孝子雖愛親留之不敢久也古者天子七月諸侯五月大夫三月士踰月誠由禮物有厚薄奔赴有逺近不如是不能集也今王宫以下皆三月而𦵏蓋以非同位外姻無㑹𦵏者故適時之宜更為之制禮未𦵏不變服啜粥居倚廬寢苫枕塊既虞而後有所變蓋孝子之心以為親未獲所安已即不敢安也今世俗信術者妄言以為𦵏不擇地及嵗月日時則子孫不利禍殃總至有至終䘮除服或十年或二十年或終身或累世猶不𦵏至為水火所漂焚他人所投棄失亡尸柩不知所之者豈不哀哉人所貴有子孫者為其死而形體有所付也既而不𦵏則與無子孫而死道路者奚以異乎詩曰行有死人尚或殣之况為人子乃忍棄其親而不𦵏哉唐太常博士吕才叙𦵏書曰孝經云卜其宅兆而安厝之蓋以窀穸既終永安體魄而朝市遷變泉石交侵不可前知故謀之龜筮近代或選年月或相墓田以為一事失所禍及死生按禮天子諸侯大夫𦵏皆有月數則是古人不擇年月也春秋九月丁巳𦵏定公雨不克𦵏戊午日下昃乃克𦵏是不擇日也鄭𦵏簡公司墓之室當路毁之則朝而窆不毁則日中而窆子産不毁是不擇時也古之𦵏者皆於國都之北域兆有常是不擇地也今𦵏書以為子孫冨貴貧賤夭夀皆因卜所致夫子文為令尹而三已栁下恵為士師而三黜計其邱壠未嘗改移而野俗無識妖巫妄言遂於擗踊之際擇𦵏地而希官爵荼毒之秋選𦵏時而規財利斯言至矣夫死生有命富貴在天固非𦵏所能移就使能移孝子何忍委其親不𦵏而求利於已哉世又有用羗胡法自焚其柩收燼骨而𦵏之者人習為常恬莫之恠嗚呼訛俗誖戾乃至此乎或曰旅宦逺方貧不能致其柩不焚之何以致其歸𦵏曰如㢘范軰豈其家冨邪延陵季子有言骨肉歸復于土命也魂氣則無不之也舜為天子廵狩蒼梧而殂𦵏於其野彼天子猶然况士民乎必也竭力不能歸其柩即所亡之地而𦵏之不猶愈於火焚乎道無精粗本未而古有大學小學之别者特學有其漸云爾子夏之門人小子洒掃應對進退而子游以為末不知洒掃應對進退即精義入神之妙而欲二之則過矣東萊先生所編少儀外傳學者終身行之猶懼不及而曰少儀云者謂時過則難學而少成若天性故欲自童丱而習之庶㡬趨嚮蚤正氣質易成非曰小學冝習而大學不必知也與我同志者盍深省焉嘉定癸未三月朔雲谷胡巖起題右少儀外傳一編先兄太史暇日手自次輯者也首命其名曰帥初次更其名曰辨志而其終則定以是名焉祖儉嘗獲侍坐與聞所以為此編之意蓋以始學之士徒玩乎見聞汨乎思慮輕自大而卒無據故指其前言徃行所當知而易見者登之於䇿使之不待考索而自有得於日用之間其於未易遽知而非可卒見則皆畧而不載茍讀是編而無所厭忽各因其所得而有自立之地則先兄之心庶乎其不泯矣丹陽郡文學譚元猷祖儉之同舍生也欲刋其書於學宫因識所聞於卷末紹熈二年七月十五日東萊吕祖儉書
